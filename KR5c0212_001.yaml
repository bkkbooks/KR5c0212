front:
  text: 北極真武普慈度世法懴卷之一二同卷則十爾時無上赤文帝君金闕化身天尊於龍漢元年中元之日在北極玄天紫微之殿㑹集諸天上聖十方至真飛天神王無極仙衆考校三界之內大千國土之中修學功過年命修短十方世界男女罪福考限之期生死報對宿命因緣時有真人名曰妙行越班而出稽首上言末世凡夫不明修學貪瞋癡愛口是心非無明煩惱積稔罪愆或身遭疾病牢獄拘囚運用乖違所作不順命沒之後墮諸地獄報對因緣何由救免天尊曰善哉言乎吾昔於龍漢劫初為太始真人中三皇時為太初真人下三皇時為太素真人開皇劫下生人世乃玄元聖祖第八十二次應化玄天修真成道憫念凡愚積惡造罪無由冀仙嘗為演說修真十戒以度兆民今得遵奉妙訓離諸報對於是妙行啓請而言十戒靈文可得見授宣告人天普獲修持日有所益於是天尊慈顔憫諭靈關廓開出十品戒文謂曰偉哉妙行能為衆生作是妙因夫身為患本過逐心生道乃法舟懴之可度積如山嶽隨念即消若能終始受持仙階可冀第一戒者不得隂賊潜謀害物利己二者不得殺害含生以充滋味三者不得淫邪敗真穢慢靈氣四者不得敗人成功析交離親五者不得露才揚己讒毀善良六者不得飲酒過差食肉違禁七者不得貪婪無猒積財不散八者不得交游非賢居處雜穢九者不得不忠不孝不信不仁十者不得輕忽言笑舉動乖真能依吾教秉心無二即得見世安樂免遭困苦若能於三元五臘甲子庚申三㑹十直之辰於諸宫觀或在家庭備列香花䖍心懴禮誓依吾教改往修來即得譴削黑書名標丹籍見存獲慶過世超升於是妙行稽首瞻仰永誓皈依散布人間流傳懴禮志心敬禮人各恭信
