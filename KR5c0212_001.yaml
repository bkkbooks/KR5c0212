body:
  text: 起敬讃三皈依敷坐讃一心皈命敬禮虛無自然元始天尊玉宸道君靈寶天尊太上老君道德天尊步虛太極分髙厚爾時妙行真人告諸仙曰昔我祖師萬劫應化真元教主太平金闕前聖虛皇大道君乃大道之玄祖三才之本根太極之先寥廓何有道源肇啓氣母混成澒洞溟涬兆眹胚腪中有真精自然而生是謂神明强名虛皇潜司玄化道運御世一氣分三為玄元始三氣混合氤氲漸著為萬象之端為萬化之本莫知其先强名曰元莫知其初强名曰始故曰元始天尊三氣相生九氣混合化生諸天成就三界莫知其大强目曰太莫知其髙强目曰上首出無極仰之曰老宰之無我主之曰君浩劫開化普度天人洪惟教主北極鎮天佑聖助順真武靈應福德真君玉虛師相玄天上帝神靈異禀成功夙著於巍巍造化既分令德已形於顯顯忘尊貴於淨樂國錬真純於武當山八十一化號為老君四十二年修為玄武列虛危之宿按水火之精尊居壬癸之方助有甲庚之將歷巡遊於下界肅號令於上穹迹屢表於至神記具陳於啓聖希夷莫測渺漠無窮在昔飛升弘開誓願謂衆生之善惡莫不齊身欲天下之操修同登妙果保疾而能認猒療明而使識姧降粟濟飢施符消疫驅除妖魅解釋𡨚憎現海救危錫棗得後嗣昌見報而戒殺元晏悟化而放生遊奕授搶以却凶蠻天罡帶箭而誅叛寇誠事者無求不應忠告者轉危為安臣等闡事仙宗實深慶幸恭披寶藴仰奉靈光稽首皈依一心敬禮志心朝禮法主玉虛師相玄天上帝志心朝禮聖父明真大帝志心朝禮聖母瓊真上仙志心朝禮聖師豐乾大帝志心朝禮西國紫玄元君志心朝禮金闕化身天尊志心朝禮玄元顯應天尊志心朝禮太清靈變天尊志心朝禮髙上玊真天尊志心朝禮日光開瑞天尊志心朝禮武曲應化天尊志心朝禮虛星應化天尊志心朝禮危星應化天尊志心朝禮天一應化天尊志心朝禮太一應化天尊志心朝禮辰星應化天尊臣等志心皈身皈神皈命玄帝顯靈應化諸天上聖切念下民居于塵網莫知先業罕究前因自世逺於鴻荒真淳遽泯逮俗逾於鹿野矯僞迭興險謀暗設於機關殺物密投於陷穽逐邪敗正掩是徇非矜衒而侮老成沉湎而食猒穢貪婪縱欲交處多愚五常汨而名分浸虧一性昏而施為實謬擾擾七情之競起紛紛十業之增添銖較萬分輪回億劫所受蓋原於所積其來由肇於其因若不際遇於善緣安得懴陳於宿障臣等恭承經寶垂訓曰禍福無門唯人自召善惡之報如影隨形謹按修真第一戒云不得隂賊潜謀害物利已切慮弟子某先世以來今生之內詫能求勝挾數藏機面從而退有言色溫而潜懷狠私𠂻毒虐積恨愆尤輕天民若剪菅茅亂國政而浸隳綱紀賞于非義刑及無辜窺伺錢糧默寓攘奪之意覬覦名位暗生傾險之心諂佞富榮欺壓卑賤舉諸枉而措諸直匿其是而較其非推過認恩嫁禍賣惡上來往業見在世中多招怨謗橫起乖屯死墮地獄長劫受苦苦盡復生遂入惡道報盡復還生於茲世以前業報尚有餘殃受報未巳今則聞經所說大可驚惶仰對聖前恭投懴悔人各恭敬志心朝禮志心朝禮太始無形天尊志心朝禮太虛無極天尊志心朝禮太玄𡨋寂天尊志心朝禮太元守朴天尊志心朝禮太空自然天尊志心朝禮太易混成天尊志心朝禮太象可凝天尊志心朝禮太古可名天尊志心朝禮太有常道天尊志心朝禮太靈空洞天尊志心朝禮太清無為天尊志心朝禮太真演教天尊志心朝禮太漠流神天尊志心朝禮太華顯慶天尊志心朝禮太曦圓照天尊志心朝禮太霄輪彩天尊志心朝禮太宸立極天尊志心朝禮太微廣化天尊志心朝禮太本流迹天尊志心朝禮太理開教天尊志心朝禮太智悟境天尊志心朝禮太定凝神天尊志心朝禮太白明素天尊志心朝禮太老廣義天尊志心朝禮太光廣德天尊志心朝禮太朴致理天尊志心朝禮太華混夷天尊志心朝禮太學致奧天尊志心朝禮太權啓迪天尊志心朝禮太平萬化天尊志心朝禮太幽抱一天尊志心朝禮太機變運天尊志心朝禮太曦鬱華天尊志心朝禮太神清漢天尊志心朝禮太清神漢天尊志心朝禮太祝廣夀天尊志心朝禮太皇廣成天尊志心朝禮太帝赤精天尊志心朝禮太和鬱圖天尊志心朝禮太和務合天尊志心朝禮太德𠃔夀天尊志心朝禮太行真妙天尊志心朝禮太極傳教天尊天尊上聖禮念既周再竭一心遙瞻神府皈命紫皇天一真慶宫元和遷校府北極佑聖院諸真仙衆今日道場大衆䖍叩教主北極鎮天佑聖助順真武靈應福德真君玉虛師相玄天上帝伏願光浮丹闕瑞應碧空洞照塵寰丕覃恩貺今為某求懴上來所犯第一品戒隂賊潜謀害物利巳之罪先世今生遺殃往劫上延祖考下逮宗親或起幸傷生或含威戕物或動違正理諂用邪謀或嫉賢妬能虧人益巳外視雍容而可慕中存乖惡以堪憂送之治廪以捐階擠之入井而下石欺凌孤寡酷虐懦庸笑裏藏刀眼中暗箭罪將條列惡已貫盈撓亂靈司紏録不巳今憑懴力願賜赦原顒望上真宣恩人世勑下元和遷校府北極佑聖院三元九府諸宫諸司仙曹案掾天官仙官靈官真宰佐巡僚吏廣行慈憫並賜赦原求懴弟子某同法衆等遵奉玄科入道登真戒當行無為精進修行誓從今去端懷忠節退守恭謙愛物憐生視人猶巳虛心實腹敢懷狼顧之思屏氣存神擬效雀㗸之報即斯發露徑此懴陳伏願天官錫紀算之名地簡列蠲非之字身安命泰志暢神清七祖亡魂永臻福果三生障惱悉殄惡因常奉正真永依玄教以斯利益遍悉莊嚴嶽鎮浸隆蘿圖永固萬姓襟裾而向慕百蠻冠帶以來朝夀比南山咸仰一人之有慶星朝北極鼎臻四海以無虞一切有情俱登道岸北極真武普慈度世法懴卷之一
