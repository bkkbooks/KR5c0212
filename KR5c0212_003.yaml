front:
  text: 北極真武普慈度世法懴卷之三四同卷則十一
  hash: sha256:9d1c23e6d9523b3fedbb481e5ee66ff3c9673c5edd645254a248b2fb96cfb017
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0212_HFL_003-001a, image: hfl/0567/0567-072.png}
body:
  text: 步虛爾時妙行真人告諸仙曰夫三寶大有金書一氣分形三清出號太初溟涬玄極洪濛中有虛皇分置五劫曰龍漢曰赤明曰上皇曰延康曰開皇當斯時也天光未分清濁未判則知三老各布始氣化生四靈以定四隅周環六合日月運乎其中推成萬物明知玄武乃天一之氣五靈老君太隂天一之化混沌赤文載惟玄帝乃元始化身太極别體上三皇時下降為太始真人中三皇時下降為太初真人下三皇時下降為太素真人至黃帝時下降正上天開皇劫初下世紫雲元年歲當甲辰三月戊辰三日甲寅庚午時符太陽之精託胎化生淨樂國善勝皇后之腹孕秀一十四月即太上八十二化也淨樂國乃奎婁星之下海外仙國上應龍變梵度天玄帝産母左脅當生之時異香瑞雲地皆金色七歲俯察仰觀靡所不通潜心念道志契太虛願事上天溥福兆民十五歲辭父母受紫玄君無極上道越東海歷翼軫星下於武當山修道四十二年功成果滿白日上升玉帝封為玄武五百歲後攝坎離真精歸根復命上為三境輔臣下作十天大聖方得顯名億劫與天地日月齊并是其果滿矣臣等知因識果感德蒙恩先地先天劫終劫始長勞造化仰俟裁成敢效藿傾葵專勤崇向一心發念稽首髙真志心敬禮志心朝禮虛無自然元始天尊志心朝禮玉宸道君靈寶天尊志心朝禮太上老君道德天尊志心朝禮玉虛師相玄天上帝志心朝禮聖父明真大帝志心朝禮聖母瓊真上仙志心朝禮聖師豐乾大帝志心朝禮西國紫玄元君志心朝禮金闕化身天尊志心朝禮玄元顯應天尊志心朝禮太清靈變天尊志心朝禮髙上玉真天尊志心朝禮日光開瑞天尊志心朝禮武曲應化天尊志心朝禮虛星應化天尊志心朝禮危星應化天尊志心朝禮天一應化天尊志心朝禮太一應化天尊志心朝禮辰星應化天尊臣等志心皈身皈神皈命玄天顯靈應化諸尊上聖臣聞太上垂訓曰凡世衆生自從有命善心因被外色侵凌耽諸愛欲遂乃障蔽善事積習惡緣若能攝動歸間存心內覺悟空非色色想即空不作淫欲之愆悟我六氣之道當常檢身心每虞過失見諸經戒常懷畏愼毋入魔界自墜惡道謹按修真第三戒云不得淫邪敗真穢慢靈氣以今弟子某心猿縱欲意馬奔馳耳管絃鼓樂之音欣欣有喜目珠翠金瑰之色念念無忘恱遇紛華愛貪竒麗喧華淫佚居中不固於閨庭醉舞歌吟樂外惟遊於里巷罔念精神之凋耗第窮筋力以疲勞葉脫根枯灰飛烟滅致疾縈纏於喘促傳尸枉逝於伏連人道乖離鬼關淪沒殆難超度空極吁嗟上來往業見在世中行巳災屯受人猒棄死墮地獄長劫受苦苦盡復生遂入惡道報盡復還生於茲世以前業故尚有餘殃受報未巳今則聞經所說心切驚惶仰對聖前恭投懴悔一心致敬皈命信禮志心朝禮至道集虛天尊志心朝禮至神合無天尊志心朝禮至清澄寂天尊志心朝禮至元造化天尊志心朝禮至寧含靜天尊志心朝禮至寶吐虛天尊志心朝禮至音冠漠天尊志心朝禮至無應變天尊志心朝禮至柔無間天尊志心朝禮至靈無待天尊志心朝禮至靈若昧天尊志心朝禮至强不息天尊志心朝禮至盈若冲天尊志心朝禮至和逹常天尊志心朝禮至常發明天尊志心朝禮至公治事天尊志心朝禮至深固本天尊志心朝禮至慈施行天尊志心朝禮至美流言天尊志心朝禮至仁進善天尊志心朝禮至惟布化天尊志心朝禮至大圖難天尊志心朝禮至安持和天尊志心朝禮至誠不動天尊志心朝禮至學過衆天尊志心朝禮至公輔物天尊志心朝禮至智多治天尊志心朝禮至式深逺天尊志心朝禮至順反物天尊志心朝禮至善不爭天尊志心朝禮至化不辭天尊志心朝禮至微幾聖天尊志心朝禮至名不去天尊志心朝禮至見無欲天尊志心朝禮至聖覃恩天尊志心朝禮至德太玄天尊志心朝禮至真長樂天尊天尊上聖禮念既周再竭一心遙瞻神府皈命紫皇天一真慶宫元和遷校府北極佑聖院諸真仙衆今曰道場大衆䖍叩教主北極鎮天佑聖助順真武靈應福德真君玉虛師相玄天上帝伏願寶劒橫空旌旗擁駕恢弘有願救度無邊今為弟子某求懴上來所犯第三品戒淫邪敗真穢慢靈氣之罪先世今生遺殃往劫上延祖考下逮宗姻或見美質屬意貪汙或凌貧素捉人殘害或間喋母子攘奪男女或隔斷親踈眩惑賢良裸露三光穢觸諸聖背馳正道妄起邪謀真氣消磨靈姿昏濁罪將條列惡巳貫盈撓亂靈司紏録不巳今憑懴力顒望宣恩勑下考校真司巡按府署司非執罰典録大神廣行慈憫並賜赦原求懴弟子某同法衆等遵奉玄科入道登真戒當行柔弱勿為邪佞誓從今去內無愛想外絶妄為視已同於視人好德甚於好色保存元氣一毫不敢以懷欺淨瀹真心萬慮悉消而自守即斯發露徑此懴陳伏願天地水府之霽威上中下尸之釋罪身康氣定志得願從妙化弘敷永錫綿洪之祉至靈不昧庶全覆佑之休常奉至真永依玄教以斯利益遍悉莊嚴國底蕃昌民臻泰定坐蔑抗衡之變行占奠枕之歡樂業安居寧有詐祖之習祈天永夀曽何駭馬之虞一切有情同登道岸北極真武普慈度世法懴卷之三
