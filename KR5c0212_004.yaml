front:
  text: 北極真武普慈度世法懴卷之四
  hash: sha256:88708f2051d66f1f0478ac5b11cd60f85faed82c6f769d8a3294ea9073765fbe
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0212_HFL_004-001a, image: hfl/0567/0567-086.png}
body:
  text: 步虛爾時妙行真人告諸仙曰在昔元始天尊生於太無之先禀自然之氣冲虛凝邈莫知其極天地淪壞劫數終盡而天尊之體常存不滅或在玉京之上或在窮桑之野授以祕道謂之開劫度人然開劫非一度矣原夫太上以龍漢元年分身降於中央大福堂國出真文赤書以化國民人皆長生又於南極赤明之國出火煉真文故號洞陽之庭有流火之池凡煉其形皆成金色上立朱陵之館以主生成又於東極碧落之天浮黎之國書真文於空青之林遂成紫字其林風度成音鳥食其葉身生文彩人得其羽即能飛行其民長生安樂無為又於西極衛羅世界西那玉國出真文於浮羅之嶽以度國人玉池自生金精流映人挹其水身生金光與天相逼又於北方鬱單之國出真文於洞靈之觀以度兆民其下寒池靈津自然流澳人得飲之無有終極五土之內皆禀太上靈寶之教以得長生因命五老上帝以鎮五方行道立教和寧羣品臣等恭聞天尊上聖垂大慈之化造立天地剖判三才令得受生人中莫知所自仰披典誥實深負荷之恩傾向䖍誠五體投地稽首髙真皈依敬禮志心朝禮虛無自然元始天尊志心朝禮玉宸道君靈寶天尊志心朝禮太上老君道德天尊志心朝禮玉虛師相玄天上帝志心朝禮聖父明真大帝志心朝禮聖母瓊真上仙志心朝禮聖師豐乾大帝志心朝禮西國紫玄元君志心朝禮金闕化身天尊志心朝禮玄元顯應天尊志心朝禮太清靈變天尊志心朝禮髙上玉真天尊志心朝禮日光開瑞天尊志心朝禮武曲應化天尊志心朝禮虛星應化天尊志心朝禮危星應化天尊志心朝禮天乙應化天尊志心朝禮太乙應化天尊志心朝禮辰星應化天尊臣等志心皈身皈神皈命玄天應靈顯化諸尊上聖臣恭承太上垂訓曰道有悟迷言有浮僞凡人三業內則在心外則因口心間所有惡業若口不能談其惡亦不彰心間雖無其事口中妄有巧言其業漸深皆因惡口鬪諜良善讒譛愚癡曲說華詞妄談謬誤不省正教不誦仙經裝飾非言是名敗壞若能口不作罪意集希言不言於惡口之中回向於讃詠之上即得常近經教讃一善以報謹按修真第四品戒不得敗人成功析交離親以今弟子某竊恐受性以來至于今曰多起嫌疑默懷嫉妬秖為利己奚恤危人孽其短而棄其長旁覘有過怒彼成而喜彼敗深訝無功誘引姻眷於燕齊遊說朋儕於吳越巧言令色但面是而背非謀為不忠徒心傳而口授道聽而𡍼說隙窺而墻從將有為無架虛作實不及者妄加訾毀多能者曲肆損虧隔絶往還結成怨惡上來往業見在世中艱辛一己憂慮百端死墮地獄長劫受苦苦盡復生生於茲世以前業報尚有餘殃受報未巳今則聞經所說大可驚惶仰對聖前恭投懴悔人各運誠䖍心朝禮志心朝禮一元混成天尊志心朝禮一生有始天尊志心朝禮一行柔慈天尊志心朝禮一約儉約天尊志心朝禮一持謙讓天尊志心朝禮一致無為天尊志心朝禮一名可論天尊志心朝禮一常三復天尊志心朝禮一性無常天尊志心朝禮一靈悟境天尊志心朝禮一能攝善天尊志心朝禮一形成勢天尊志心朝禮一器畜物天尊志心朝禮一智明守天尊志心朝禮一利濟動天尊志心朝禮一已襲常天尊志心朝禮一真賦體天尊志心朝禮一善潤家天尊志心朝禮一慶資鄉天尊志心朝禮一政護國天尊志心朝禮一言善應天尊志心朝禮一施不恃天尊志心朝禮一㓛不履天尊志心朝禮一棄三絶天尊志心朝禮一事從容天尊志心朝禮一中有信天尊志心朝禮一為品式天尊志心朝禮一合符冲天尊志心朝禮一教獨立天尊志心朝禮一居四大天尊志心朝禮一含四法天尊志心朝禮一知三守天尊志心朝禮一善五果天尊志心朝禮一宗四具天尊志心朝禮一居七善天尊志心朝禮一存四身天尊志心朝禮一利三能天尊志心朝禮一無不活天尊志心朝禮一含萬象天尊天尊上聖禮念既周再竭一心遙瞻神府皈命紫皇天一真慶宫元和遷校府北極佑聖院諸真仙衆今日道場大衆䖍叩教主北極鎮天佑聖助順真武靈應褔德真君玉虛師相玄天上帝伏願神龜命駕瑞鶴臨軒拯濟凡庸駢臻釐福今為弟子某求懴上來所犯第四品戒敗人成功析交離親之罪先世今生遺殃往劫上延袓考下逮宗親見利忘義而敗壞功勞背恩絶愛而隔斷親犮暗生巇嶮潜設機關或交合妄起於紛爭或諂佞橫生於間越遞傳虛語矯飾詐情惟務圖謀是名障礙罪將條列惡巳貫盈撓亂靈司紏録不巳今憑懴力顒望宣恩勑下上天垕地四時五行六律七星司功考過一切神司仙曹主吏廣行慈憫並賜赦原求懴弟子某同法衆等遵奉玄科入道登真戒當行無妄勿為諂詐誓從今去言無口過行務已修視人猶已之非殊推功讓能而不伐上和下睦俾成勛績之隆內撫外寧肯使親踈之間即斯發露徑此懴陳伏願玉音宣布於皇休金闕旋頒於睿㫖庸覺非而悔過俾解厄以消災隱顯和同俯仰庶期於無愧幽冥超度沾濡均濟於有緣常奉至真永依玄教以斯利益遍悉莊嚴星曜順𨇠雨暘應候獲秀頴嘉禾之瑞無飛霜隕草之虞與時皆行無旱乾而水溢極天所覆俾道泰以人和一切有情俱登道岸北極真武普慈度世法懴卷之四
