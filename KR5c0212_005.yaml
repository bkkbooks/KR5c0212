front:
  text: 北極真武普慈度世法懴卷之五六同卷則十二
  hash: sha256:07bac77b06a9e8cab07ab3799221c7797c2a274559f15d80a40ef8f40d7d305e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0212_HFL_005-001a, image: hfl/0567/0567-100.png}
body:
  text: 步虛爾時妙行真人告諸仙曰夫三洞寶經皆三清之上道也故老君曰吾昔受之於元始天尊于今七億萬劫天地成壞萬品生滅唯吾道獨在今猶修之於景雲之上嘗以玉清玄簡出傳真公於無量夀天又傳於青童大君依九天品格萬劫一出自開皇以來傳授後學應為真者九千年聽傳三人或四十年或九年中遇有其人聽願傳之今末代澆薄拯濟尤切皆以齋戒為先隂功為務以拔九祖之罪以度羣品之厄後及巳身立功布德上遵天憲以期超度故有二十七等齋科三十六品醮法夫三籙者曰金籙齋調和隂陽保鎮國𧙓曰玉籙者昌國化民保安兆姓曰黃籙者拔度九玄七祖永辭長夜之苦七品齋者一曰明真齋超度幽爽解諸𡨚對二曰自然齋普為衆生謝罪消災學仙修行三曰三元齋自謝犯戒之罪解考三官四曰八節齋謝玄祖及已身黑簿之罪五曰洞神齋以清潔守素為貴救疾禳災為功六曰塗炭齋以苦節為功悔過請福七曰指教齋上則以清虛簡寂為用次則以吐納服御為階下則以洗心悔過為宗普則以後巳先人為要功滿三千白日升天臣等欣逢聖教得遇真風未能剋志奉行惟當竭心崇嚮一心發念五體投誠稽首皈依志心朝禮志心朝禮虛無自然元始天尊志心朝禮玉宸道君靈寶天尊志心朝禮太上老君道德天尊志心朝禮玉虛師相玄天上帝志心朝禮聖父明真大帝志心朝禮聖母瓊真上仙志心朝禮聖師豐乾大帝志心朝禮西國紫玄元君志心朝禮金闕化身天尊志心朝禮玄元顯應天尊志心朝禮太清靈變天尊志心朝禮髙上玉真天尊志心朝禮日光開瑞天尊志心朝禮武曲應化天尊志心朝禮虛星應化天尊志心朝禮危星應化天尊志心朝禮天一應化天尊志心朝禮太一應化天尊志心朝禮辰星應化天尊臣等志心皈身皈神皈命玄天顯靈應化諸尊上帝臣等恭承太上垂訓曰凡世衆生不悟宿因不修善果無明所覆有礙所通不假懴陳何由悟解且夫天與世雖異其境界同聖與人雖殊其義理等三清道境十方天尊亦在人修皆與聖合人之墮於惡道皆由在世三業最大作惡造業顯揚於外若能內滅惡心外忘惡口不談彼短不衒巳長見人過愆誓不傳説惜聲閉口愛氣希言忘心於綺麗之中回懴於敬信之上在世即得身貴名髙一善之報履踐世間人神安妥謹按修真第五品戒云不得露才揚巳讒毀善良以今弟子某等切恐誠心弗粹浩氣至剛恃巳多謀抑人未悟圭璋河漢誇文海之波瀾黼黻雲煙輝事功於山嶽俊力俯欺於庸懦妙齡強壓於老成萋菲巨賢笑談至善勢多強悍性匪柔和賤踰貴卑襲尊小陵大下犯上駸駸自言於得志囂囂不務於檢身浸潤之譛愈萌毀譽之私迭起上來往業見在世中遭人詬責觸事迍邅死墮地獄長劫受苦苦盡復生遂入惡道報盡復還生於茲世以前業故尚有餘殃受報未巳今則聞經所説大可驚惶仰對聖前恭投懴悔志心朝禮人各恭敬志心朝禮無始可元天尊志心朝禮無為可任天尊志心朝禮無法可説天尊志心朝禮無言可論天尊志心朝禮無視可見天尊志心朝禮無聽可聞天尊志心朝禮無廣不覆天尊志心朝禮無微不通天尊志心朝禮無感不應天尊志心朝禮無幽不燭天尊志心朝禮無化不周天尊志心朝禮無逺不屇天尊志心朝禮無理不悟天尊志心朝禮無欲不靜天尊志心朝禮無善不克天尊志心朝禮無光不照天尊志心朝禮無行不加天尊志心朝禮無業不進天尊志心朝禮無日不求天尊志心朝禮無方不到天尊志心朝禮無事不和天尊志心朝禮無戒不持天尊志心朝禮無謀不成天尊志心朝禮無功不立天尊志心朝禮無德不顯天尊志心朝禮無人不施天尊志心朝禮無義不為天尊志心朝禮無問不對天尊志心朝禮無教不言天尊志心朝禮無機不轉天尊志心朝禮無行不匝天尊志心朝禮無妙不歸天尊志心朝禮無名不可天尊志心朝禮無有不供天尊志心朝禮無轉不靈天尊天尊上聖禮念既周再竭一心遙瞻神府皈命紫皇天一真慶宫元和遷校府北極佑聖院諸真仙衆今日道場大衆虔叩教主北極鎮天佑聖助順真武靈應福德真君玉虛師相玄天上帝伏願祥光俯御瑞相端臨濟衆施恩釋𡨚寬罰今為弟子某等懴除上來所犯第五品戒露才揚已讒毀善良之罪先世今生遺殃往劫上延祖考下逮宗親以英毫凌鑠寬和以藝能笑侮庸瑣揚揚自得行行蔑如或勢力不屈而起怨嗟或語言多諂而生譏誚但知有巳旁若無人自負太髙肆欺逾甚罪將條列惡巳貫盈撓亂靈司紏録不巳今憑懴悔顒望宣恩勑下所部繡衣使者典録大神八方九州隂陽主吏曹員務局一切明神廣行慈憫並賜赦原求懴弟子某同法衆等遵奉玄科入道登真戒當行守恪勿為巳先誓從今去至恭盡禮和光同塵不矜而莫與爭能見善而有如不及謙沖退處屏除矯偽之情蹇諤優容杜絶乖愆之念既斯發露徑此懴陳願得帝澤下覃皇威上暢四序永消於坎坷一門俱遂於泰亨戴履無慚庶悉依於護佑照臨不忒敢晦昧於行藏常奉至真永依玄教以斯利益遍悉莊嚴百榖登成五材並用盡掃旱蝗之害免為魚鱉之災足食足衣無啼飢號寒之苦多黍多稌殫感恩荷德之思一切有情同登道岸北極真武普慈度世法懴卷之五
