front:
  text: 北極真武普慈度世法懴卷之六
  hash: sha256:6c19f7d0db59361890535fb9b8a7e0d8faf569fc55ee51669dd0e9dbefff29db
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0212_HFL_006-001a, image: hfl/0567/0567-114.png}
body:
  text: 步虛爾時妙行真人與諸仙子曰昔九疑山女真王妙想朝謁精誠忽有所感一日祥雲滿庭光燭殿壇旌幢鶴蓋浮空而下見一天官羽衣寶冠升殿而坐謂妙想曰吾乃往昔有虞氏之君舜帝也勞猒萬國養道此山每欲誘教後人使之知道世無可教授者夫道在於內不在於外道在爾身不在他人玄經所謂修之於身其德乃真近者地司所奏汝守道不邪遵禀玄戒若無所證乃道之棄人也又玄經云常善救物故無棄物而道之布惠周遍則物物皆欲成之人人皆欲度之但世人福果卑微道氣膚淺不能精專勤學道業未就而巳中怠是人自棄道非道棄人蓋上聖髙真愍歷劫不常代運流轉隂陽倚伏生死推遷俄爾之間至陽九百六之㑹孜孜下教以救於人尤切於世人之求道也然世人求道也若存若亡繫念存心萬中無一天真愍俗常在人間隱影化形隨方開悟子欲長生三一當明子能守一一亦守子矣能變為精精變為嬰兒嬰兒上為真人真人然後為亦子此是真人一也又曰僞道養形真道養神神真道通能亡能存神能飛形亦能移山形受灰土其何識焉身目聲色為子留愆鼻口所喜香味是𡨚身為惱本痛癢寒溫意為形纍愁毒憂煩弗疾去之則志氣自耗夀命不延臣等欽惟上聖哀救世人廣示訓章開度羣品當遵品戒竭心修習負荷至恩不勝慚激一心發念五體傾依稽首慈尊敬禮真聖志心朝禮虛無自然元始天尊志心朝禮玉宸道君靈寶天尊志心朝禮太上老君道德天尊志心朝禮法主玄天仁威上帝志心朝禮聖父明真大帝志心朝禮聖母瓊真上仙志心朝禮聖師豐乾大帝志心朝禮西國紫玄元君志心朝禮金闕化身天尊志心朝禮玄元顯應天尊志心朝禮太清靈變天尊志心朝禮日光開瑞天尊志心朝禮武曲應化天尊志心朝禮虛星應化天尊志心朝禮危星應化天尊志心朝禮天一應化天尊志心朝禮太一應化天尊志心朝禮辰星應化天尊臣等志心皈身皈神皈命玄天應靈顯化諸尊臣等恭承經寶太上垂訓曰齊戒者道之根本法之津梁子欲學道清齊奉戒念念正真邪妄自泯一切衆生捨清淨域耽嗜葷羶而以觸法譬如餓鬼啖食死尸火燒飢腸飢腸無飽又如蠅蟲爭奪臭腐妄為羶香而以觸法三宫溷濁六腑不淨尸魄欣昌樂於死地子當割嗜欲根入真淨境無作諸苦無造諸惡無生諸見無犯諸邪子觀戒文如世法律欲有所犯愳金木刑子於戒文精意奉持凛然在前如對所畏秉心正嚴滅一切想諦聽不二可㑹正真是吾弟子也謹按修真第六品戒云不得飲酒過差食諸猒物以今弟子某等切慮縱心侈欲玩意貪觀量吸鯨吞日夕第從於酩酊味耽鴆毒歲時惟喜於腥羶假名乎仙境之瓊漿求異乎貴家之玉食忘形嗜好適興肥甘百醉千場裸袒轉成於放曠五辛六猒啖嘗務在於飽充穢氣爍人沈酗亂性舉動第多於狂惑語言罔顧於淫邪矧當齊禴之辰偏起殱殘之念但資口腹不謹身軀遍街握腕以潜行穢室躡蹤而競往所為不擇其處非良踐履既虧設施徒謬上來往業見在世中立身譾薄舉事卑汙死墮地獄長劫受苦苦盡復生遂入惡道報盡復還生於茲世以前業故尚有餘殃受報未己今則聞經所說大可驚惶仰對聖前恭投懴悔一心致䖍皈依信禮志心朝禮靈元虛湛天尊志心朝禮靈始象仙天尊志心朝禮靈常淡寂天尊志心朝禮靈逹無為天尊志心朝禮靈為悟本天尊志心朝禮靈能合漢天尊志心朝禮靈通無極天尊志心朝禮靈一通神天尊志心朝禮靈欲觀妙天尊志心朝禮靈藏萬化天尊志心朝禮靈當利用天尊志心朝禮靈氣致柔天尊志心朝禮靈昶微明天尊志心朝禮靈顔瑞妙天尊志心朝禮靈光及物天尊志心朝禮靈音演妙天尊志心朝禮靈文溥暢天尊志心朝禮靈書紀教天尊志心朝禮靈風傳瑞天尊志心朝禮靈運隂陽天尊志心朝禮靈彰造化天尊志心朝禮靈周十地天尊志心朝禮靈超萬慮天尊志心朝禮靈光法性天尊志心朝禮靈化無私天尊志心朝禮靈轉無涯天尊志心朝禮靈用不窮天尊志心朝禮靈慶有性天尊志心朝禮靈智不殆天尊志心朝禮靈根持重天尊志心朝禮靈無妄作天尊志心朝禮靈無彼竟天尊志心朝禮靈除我智天尊志心朝禮靈機逐變天尊志心朝禮靈根復命天尊志心朝禮靈洞大無天尊志心朝禮靈泉大有天尊志心朝禮靈有大惠天尊天尊上聖禮念既周再竭一心遙瞻神府皈命紫皇天一真慶宫元和遷校府北極佑聖院諸真仙衆今日道場大衆䖍叩教主北極鎮天佑聖助順真武靈應福德真君玉虛師相玄天上帝伏願甲騎前驅丁神後從茂揚休祉俯洽黎民今為弟子某懴除上來所犯六品戒云飲酒過差食諸猒物之罪先世今生遺殃往劫上延祖考下逮宗親沉酣不巳而溺志踈强遊宴無度而裸身廢禮喜烹異味不知猒觸之愆故殺含靈專事膾炙之美誇恃酒聖宰戮物牲䙝慢高真難逃重譴罪將條列惡巳貫盈撓亂靈司紏録不已今憑懴悔顒望宣恩勑下九府業道治罪宜官主録曹僚靈司掾吏執法大神廣行慈浼並賜赦原求懴弟子某同法衆等遵奉玄科入道登真戒常行清淨匆矜汙俗澄神淨慮約巳存神飲無過多食無猒穢守皆醉獨醒之悔微以借紅楯養生送死之規資之斑白即斯發露徑此懴陳伏願澤沛乾坤恩垂雨露原宥顛狂之譴鑒觀改悔之私惠及草萊咸享安康之樂光浮蓬蓽永消暗昧之虞常奉至真永依玄教以斯利益遍悉粧嚴國治民安莫匪平寧而置器官清道泰曽何凌犯以爭衡一切有情俱登道岸北極真武普慈度世法懴卷之六
