front:
  text: 北極真武普慈度世法懴卷之七八同卷則十三
  hash: sha256:f6515b20be3938ef0e9e865089c9c937788ab0a686b487d12a1e6776b70d0696
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0212_HFL_007-001a, image: hfl/0567/0567-128.png}
body:
  text: 步虛爾時妙行真人告諸仙曰昔太上顯號靜老天尊行教五方開度人天乃先天地以資萬類上處玉京為神王之宗下在紫微為飛仙之祖千變萬化有德不德隨機應物厥跡無常授軒轅於崆峒教帝嚳於牧德大禹承長生之訣尹喜受道德之㫖丹書紫字升玄飛步之經玉石金光妙有洞靈之說如此之文不可勝紀自上古歷劫至黃帝帝嚳夏禹並遇神人咸受道籙年代既久經史無聞造及姬周東辭函谷西入罽賔見恍愡之容演希夷之訓是以善利西方化流中國且夫人之生也天傅之以神地傅之以精中和傅之以氣人能保精愛神護氣內則致身長生外則致國太平故為人臣者當上忠其君欲其長生為人子者當念父母懼其將老為人弟子者當念師恩蓋受身於父毋成道德於真師得水土之養於君尊當念君父師之將老無以復之或行學修善更師賢明求竒才異術而資益之此乃太古上皇嘗令修善之人言行精實心自克責洗心易行感動上玄受天地恩不忘報謝精專弗怠得致神仙臣等幻化生身叨承蓋載君親寵渥父毋劬勞得佩訓章敢忘所自式憑香火用報洪恩秉躬致䖍一心發念稽首皈依正真三寶志心朝禮虛無自然元始天尊志心朝禮玉宸道君靈寶天尊志心朝禮太上老君道德天尊志心朝禮玉虛師相玄天上帝志心朝禮聖父明真大帝志心朝禮聖母瓊真上仙志心朝禮聖師豐乾大帝志心朝禮西國紫玄元君志心朝禮金闕化身天尊志心朝禮玄元顯應天尊志心朝禮太清靈變天尊志心朝禮髙上玉真天尊志心朝禮日光開瑞天尊志心朝禮武曲應化天尊志心朝禮虛星應化天尊志心朝禮危星應化天尊志心朝禮天一應化天尊志心朝禮太一應化天尊志心朝禮辰星應化天尊臣等志心皈身皈神皈命三寶至尊玄天上帝顯靈應化諸大天尊臣恭聞太上垂訓曰一切衆生處在浮世百年幾日如時餉間石火電光何能得久如蛾撲燈自取殞滅不能明了誤此縈纏惟懷吝惜常負貪求聚積山髙心猶不足一日之活作千年計生既不將一錢來死亦不將一錢去一朝身殁萬事皆空無量慳貪盡成虛幻在世積財不散寧免水火盜賊之菑用計謀人豈免乏絶子孫之報當此之時英雄豪貴頓爾俱消髙車大馬何關人事華堂峻宇盡屬他人姻眷吁嗟有何所益謹按修真第七品戒云不得貪求無猒積財不散重念臣等私憂過計遐想貪圖積貯務多貪叨何巳兼并貨賄欲此富而彼貧攘取田廬視我强而他弱登龍斷而罔利競蝸角以求贏朝謀夕慮而惟恐其無左經右營而不滿所欲稻𥹭腐廪肯分顆粒以賑飢錢楮充梁豈散一毫而濟乏奉養且聞於薄鄙困窮奚暇於憫憐席卷猶求囊慳愈澀上來往業見在世中慮勤憔悴禍遇寇攘死墮地獄長劫受苦苦盡復生遂入惡道報盡復還生於茲世以前業故尚有餘殃受報未巳今則聞經所說大可驚惶仰對聖前恭投懴悔一心致䖍皈命敬禮志心朝禮空蕆大象天尊志心朝禮空量太華天尊志心朝禮空包妙寂天尊志心朝禮空澄太定天尊志心朝禮空清太漢天尊志心朝禮空惟無作天尊志心朝禮空處無為天尊志心朝禮空符至一天尊志心朝禮空理無礙天尊志心朝禮空藏常用天尊志心朝禮空含法界天尊志心朝禮空相不拘天尊志心朝禮空谷妙利天尊志心朝禮空顯淨明天尊志心朝禮空傳大梵天尊志心朝禮空虛示法天尊志心朝禮空談妙理天尊志心朝禮空文持妙天尊志心朝禮空洞飛章天尊志心朝禮空歌振響天尊志心朝禮空韻流鈴天尊志心朝禮空谷應聲天尊志心朝禮空照靈境天尊志心朝禮空成萬化天尊志心朝禮空明太白天尊志心朝禮空談清音天尊志心朝禮空行清髙天尊志心朝禮空相無妄天尊志心朝禮空智無境天尊志心朝禮空妙非常天尊志心朝禮空才廣德天尊志心朝禮空靜無歸天尊志心朝禮空不定應天尊志心朝禮空歸無滯天尊志心朝禮空來滅念天尊志心朝禮空無不成天尊志心朝禮空不礙色天尊志心朝禮空體至無天尊志心朝禮空法澄虛天尊天尊上聖禮念既周再竭一心遙瞻神府皈命紫皇天一真慶宫元和遷校府北極佑聖院一切仙衆今日道場大衆䖍叩教主北極鎮天佑聖助順真武靈應福德真君玉虛師相玄天上帝伏願履龜按蛇駕鸞馭鳯大開慈浼廣濟凡庸今為弟子某求懴上來所犯第七品戒貪求無猒積財不散之罪先世今生遺殃往劫上延祖考下逮宗親探取人財以為已財規圖人物以為己物沉機不露狡計妄施或貿遷在市而視有若無或收藏潤屋而用虛易實數盈億兆用吝纎毫惟貪富積以快心不顧財多能害已罪將條列惡巳貫盈撓亂靈司紏録不巳今憑懴力顒望宣恩勑下司功紏非陽官隂吏執籙把籍掌憲天神善惡明靈校量宰佐廣行慈憫並賜赦原求懴弟子某同法衆等遵奉玄科入道登真戒當行知足常守節操誓從今去善因早植微利勿貪囊箱隨分以貯儲倉廪何憂於匱乏知止知足經營肯事於過求可速可行周急不為之繼富即斯發露徑此懴陳伏願生成廣佑於範圍臨照不殊於覆蓋門户享興隆之福尊卑承靖謐之庥天相匪虛俯仰各安於飽暖日生不竭散布庶盡於周流常奉正真永依玄教以斯利益遍悉莊嚴隱顯交通存亡超度九幽開泰八難消屯出黑道登朱宫即膺拔擢拜洪恩承惠澤咸使沾濡一切有情俱登道岸北極真武普慈度世法懴卷之七
