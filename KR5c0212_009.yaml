front:
  text: 北極真武普慈度世法懴卷之九十同卷則十四
  hash: sha256:30724d49e15bc924203e02047f4be138913e4ab9f5281b6a5df9c76293501e60
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0212_HFL_009-001a, image: hfl/0567/0567-158.png}
body:
  text: 步虛爾時妙行真人告諸仙曰吾自往昔聞太上妙訓曰吾於無形無名鴻濛澒洞溟涬之中開道玄黃分靈散氣從大羅下生三境次生九帝為三寶之玄津出三十六部為三境之玄根次而三十二天三十二帝潜通開化下分三界傍貫璇璣二十八宿五星𨇠度以明五方清氣上騰為天重濁下凝為地中生為人天地人物無不備焉故陽和正氣化生元君聖后仙妃玉女剛烈英勇之氣化生天丁力士神兵將吏隂陽五行之氣化生男女雜謬之氣化生飛禽走獸咸禀一氣萬種不同隨其化生受性各異出機入機一往一返長勞造化仰賴甄陶臣今恭披經品實深負荷因言開示了覺前因省悟此身至于今日幸居人品之中知過知非恭禮天尊用祈大宥一心敬禮人各恭信志心朝禮虛無自然元始天尊志心朝禮玉宸道君靈寶天尊志心朝禮太上老君道德天尊志心朝禮玉虛師相玄天上帝志心朝禮聖父明真大帝志心朝禮聖母瓊真上仙志心朝禮聖師豐乾大帝志心朝禮西國紫玄元君志心朝禮金關化身天尊志心朝禮玄元顯應天尊志心朝禮太清靈變天尊志心朝禮髙上玉真天尊志心朝禮日光開瑞天尊志心朝禮武曲應化天尊志心朝禮虛星應化天尊志心朝禮危星應化天尊志心朝禮太一應化天尊志心朝禮天一應化天尊志心朝禮辰星應化天尊臣等志心皈身皈神皈命玄天顯靈應化諸尊上聖臣等恭承經寶太上垂訓曰三元八節五臘十直甲子庚申本命之日一切仙真四極十華三界四天玉童玉女金剛神王善惡童子上聖髙尊飛天步虛持幢建節燒香散花執符把籙按行人間條録善惡若有衆生不作諸惡能修諸善持齊奉戒行道傳經建立壇殿開度天人施生布德講說大乘教化男女救度衆生天仙即將人之善簿奏上元始告下天曹即令隨功𥙷過或遷上天或至得道或有掌管職制簽書種種仙階隨功遷補得登聖境者亦由積善所及受茲福報若有衆生或為官長酷虐萬民或恃豪强欺凌貧賤為子不孝為臣不忠裸露三光不敬三寶怨天罵地欺公循私殺害牲傷人異物十惡五逆三業六根結造惡因遞招業報天仙即將人之惡簿奏上元始告聞天曹遍下地府或令惡病或令死亡或值𡨚家或為異類或入地獄或入幽牢經歷劫年無由得出皆是人之作惡受報謹按修真第九戒云不得不忠不孝不信不仁以今弟子某等切慮外邪交蔽下愚不移命義之戒不明言動之端浸泯指鹿為馬將竊柄以弄權謂鳥曰鸞欲希恩而示寵博奕飲酒而不顧其養私財慕色而不念其親詈怒父兄讒譛師友違禮傷教好勇疾貧施為屢誚於鄉閭䔍敬弗行乎州里徇名失實悖行違言徙木豫金償城易玉矯枉輒欺於人巳虛辭不畏於神明坑陷賢能穽擠慈善毒痡庶類虐害羣生上來往業見在世中處事﨑嶇遭人凌忽死墮地獄長劫受苦苦盡復生遂入惡道報盡復還生於茲世以前業故尚有餘殃受報未巳今則聞經所說大可驚惶仰對聖前恭投懴悔志心朝禮大混凝空天尊志心朝禮大朴澄元天尊志心朝禮大器資治天尊志心朝禮大象無形天尊志心朝禮大冲隱名天尊志心朝禮大梵彌羅天尊志心朝禮大白光無天尊志心朝禮大梵妙有天尊志心朝禮大方不易天尊志心朝禮大乘全用天尊志心朝禮大羅曰上天尊志心朝禮大量開明天尊志心朝禮大行梵氣天尊志心朝禮大明普鑑天尊志心朝禮大洞真源天尊志心朝禮大盈不溢天尊志心朝禮大順至逺天尊志心朝禮大黍縣空天尊志心朝禮大法周行天尊志心朝禮大數起元天尊志心朝禮大志自强天尊志心朝禮大不恃能天尊志心朝禮大僞不為天尊志心朝禮大寡不逆天尊志心朝禮大曆無疆天尊志心朝禮大定有數天尊志心朝禮大言不辨天尊志心朝禮大雄不成天尊志心朝禮大用無方天尊志心朝禮大泛可恃天尊志心朝禮大為不爭天尊志心朝禮大强不息天尊志心朝禮大質不文天尊志心朝禮大威不武天尊志心朝禮大色一氣天尊志心朝禮大全四域天尊志心朝禮大可分時天尊志心朝禮大貴常無天尊志心朝禮大廣清虛天尊志心朝禮大禮無窮天尊天尊上聖禮念既周再竭一心遙瞻神府皈命紫皇天一真慶宫元和遷校府北極佑聖院諸真仙衆今日道場大衆䖍叩教主北極鎮天佑聖助順真武靈應福德真君玉虛師相玄天上帝伏願厚澤無私靈光有煒鑑觀塵世覆佑愚氓今為求懴弟子某求懴上來所犯第九品戒不忠不孝不信不仁之罪先世今生遺殃往劫上延祖考下逮宗親事君非禮而不克盡忠與人弗誠而多行皆約罔忽親恩而頑狠觸犯長上以欺凌或多言數窮不能守中或用意大虐不能慈忍罪將條列惡巳貫盈撓亂靈司紏録不巳今憑懴力顒望宣恩勑下考簿檢籙執罰典刑紏過司非賞善紀籍隂陽典吏府署大神廣行慈憫並賜赦原求懴弟子某同法衆等遵奉玄科入道登真戒當行遜讓以道接物誓從今去結纓靖難扇枕奉親克復禮以為仁有諸巳之謂信四端有則兢兢恐名教之虧六典謹修惴惴盡檢防之道即斯發露徑此懴陳伏願化日昭垂道風丕變凡服膺於名節均被冒於恩庥落滅惡根殄掃邪魔之撓注題福籍增延久視之齡常奉至真永依玄教以斯利益遍悉莊嚴道極恢宏德綿清淨積善臻於餘慶推誠立於良因獲依寶祚之尊安與天齊久更底璇源之深廣易地皆然一切有情俱登道岸北極真武普慈度世法懴卷之九
