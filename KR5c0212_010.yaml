front:
  text: 北極真武普慈度世法懴卷之十
  hash: sha256:b333038d61d547acfdf8cc4396cf2900b5e7d86468c67aace39e8fc273524c45
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0212_HFL_010-001a, image: hfl/0567/0567-172.png}
body:
  text: 步虛爾時妙行真人上白天尊曰隂陽劫運之數可得聞乎天尊言曰上天運紀天圎十二綱地方十二紀綱運三百三十度為陽孛紀推三千二百度為隂蝕天綱二百三十日運關一周地紀二千三百日推機一度九千九百度為天地氣交是名太陽九百六十度為天地氣否亦名大劫大運也以數乘之凡三百三十年一度陽孛故為小陽九之災一百八十萬九千年即天綱運關三千三萬周地紀推機三千三百度此大運之交也夫天動地靜陽躁隂遲故有孛蝕之異耳此時天氣窮於太隂地氣極於太陽陽極則孛隂極則否陽極則其精化為水隂極則其精化為火次漂之以大水上至九天之下下至九地之內金玉化消毫末無遺然後九氣復合謂之混沌再分則三天上聖四天種民下世教化亦如此劫之初三皇五帝相承而治矣如此變革總名為元氣離合太上歷此離合之數經無量劫故西升經云動則有載劫自惟甚苦勤又云驅除之後開大有之民於是妙行稽首而言臣等不省本源莫知先後切恐世人生逢劫運何以保身今蒙所示大生怖畏是用竭心叩禮惟道是依此世來生不值災屯常親妙道願為一身再秉䖍誠一心發念敬禮真聖志心朝禮虛無自然元始天尊志心朝禮玉宸道君靈寶天尊志心朝禮太上老君道德天尊志心朝禮玉虛師相玄天上帝志心朝禮聖父明真大帝志心朝禮聖毋瓊真上仙志心朝禮聖師豐乾大帝志心朝禮西國紫玄元君志心朝禮金闕化身天尊志心朝禮玄元顯應天尊志心朝禮太清靈變天尊志心朝禮髙上玉真天尊志心朝禮日光開瑞天尊志心朝禮武曲應化天尊志心朝禮虛星應化天尊志心朝禮危星應化天尊志心朝禮天一應化天尊志心朝禮太一應化天尊志心朝禮辰星應化天尊臣等志心皈身皈神皈命玄天顯靈應化諸尊上聖臣恭承經寶太上垂訓曰吾念衆生流浪沉淪不出苦海此之世界名曰棄賢宛利天境亦曰雜報世界染欲愛天生在其中暫生即滅暫聚即散如彼電光須㬰即逝不淨臭穢生老病死痛癢疼酸飢寒暑濕水火刀兵魔精鬼賊毒風惡疰交相中害念念無常曽不暫住苦惱幾何目前行事身自纏繞尚不覺知豈肯信有諸天道境福地神仙長生不死自在無為世之受生促於蜉蝣世之快樂何異糞蟲猶不自知常為安樂豈不是苦復念人之受生未有不從先業來者故禀神挺質各有因緣罪福吉凶悉從其業所有壽夭貴賤富貧好醜智愚等各不同乃至鳥獸蟲魚雞犬草木亦復然也况以人生受身甚難逢遇一朝敗壞萬劫何期我故殷勤戒勸汝等所以戒勸勤修齊戒行道誦經禮懴燒香然燈布施懴悔發願濟生度死造像寫經度人立觀水斷造橋道邊立井渡諸行人濟諸困苦種種方便為其衆生作當來徑路我豈有所求一切衆生各宜思惟謹按修真第十戒云不得輕忽言笑舉動乖真以今弟子某等竊慮蕩心駭目奮臂搖身湮沒五常忽略三畏譊譊不實第多謗訕之辭落落無稽誰謂毀譽之直談何容易語本空踈拍掌長呵縱情大笑捧腹至為於絶倒恱顔不憚於佞邪撰造虛浮䙝慢戲狎興居强誕出入顚擠凡綱常躬履之問惟讒諂面諛之務上來往業見在世中禀姿謬妄措慮險巇死墮地獄長劫受苦苦盡復生遂入惡道報盡復還生於茲世以前往業尚有餘殃受報未巳今則聞經所說大可驚惶仰對聖前恭投懴悔志心敬禮志心朝禮道元固一天尊志心朝禮道氣淵冲天尊志心朝禮道先大象天尊志心朝禮道攄大朴天尊志心朝禮道散成器天尊志心朝禮道風無滯天尊志心朝禮道不封治天尊志心朝禮道成元梵天尊志心朝禮道無可方天尊志心朝禮道有可成天尊志心朝禮道隨氣動天尊志心朝禮道迎時運天尊志心朝禮道開大古天尊志心朝禮道御金有天尊志心朝禮道展二儀天尊志心朝禮道明三友天尊志心朝禮道存帝一天尊志心朝禮道臻化萬天尊志心朝禮道上洞靈天尊志心朝禮道潜入妙天尊志心朝禮道性清靜天尊志心朝禮道觀內外天尊志心朝禮道能窮理天尊志心朝禮道可盡性天尊志心朝禮道居權世天尊志心朝禮道凌常用天尊志心朝禮道明博益天尊志心朝禮道貴坐忘天尊志心朝禮道光遺照天尊志心朝禮道教圓明天尊志心朝禮道文簡約天尊志心朝禮道理散萬天尊志心朝禮道情得一天尊志心朝禮道運虛通天尊志心朝禮道流無極天尊志心朝禮道全本迹天尊志心朝禮道周體用天尊志心朝禮道明出入天尊志心朝禮道合逍遙天尊志心朝禮道常無為天尊天尊上聖禮念既周再竭一心遙瞻神府皈命紫皇天一真慶宫元和遷校府北極佑聖院諸仙真衆今日道場大衆䖍叩教主北極鎮天佑聖助順真武靈應福德真君玉虛師相玄天上帝伏願施恩報德掃穢除氛遍際乾坤開蘇困遁今為弟子某懴悔上來所犯第十品戒輕忽言笑舉動乖真之罪先世今生遺殃往業上延祖考下逮宗姻興邦喪邦謾一言之簧鼓成德敗德徒異意以錙銖或以言廢人或游談聚義諂笑嬉戲恣遊宴以無窮狂狷剛强務跳梁而罔忌弗恆其德難與為仁同而不和驕而不泰罪將條列惡巳貫盈撓亂靈司紏録不巳今憑懴力顒望宣恩勑下三官九府百二十曹福地洞天名山仙境考校考録靈司大神巡察冥官主紀僚屬廣行慈憫並賜赦原求懴弟子某遵奉玄科入道登真戒當行諸善常務保持誓從今去修已以敬出入起居之益欽存誠不欺舉措操修之加謹即斯發露徑此懴陳伏願覆護匪私監觀如在施張大德原宥積愆時叙調和疾疢災迍之殄散家門寧謐水火盜賊之消除常奉至真永依玄教以斯利益遍悉莊嚴宗杜綿洪邊疆澄肅疫疾不經於傳染瘟㾮無致於流行氣體充盈時永臻於泰定精神發越壽可算於耆頥一切有情俱登道岸北極真武普慈度世法懴卷之十太清中黃真經釋題盡一中黃經亦曰胎藏論胎藏論者九仙君黃真人所集也真人常觀察元氣浩然凝結成質育之以五藏法五行以相應明之以七竅象七曜以昭晰其識潜萌其神布行安魂帶魄神足而生形神相託神形相成口受外味以忘識身受內役以喪精神離形以散壞形離神以去生殊不知皮肉相應筋骨乃成肝合筋以外爪心合脉以外色脾合肉其外唇肺合皮其外毛腎合骨其外髮鹹傷筋苦傷骨甘傷肉辛傷氣酸傷血故聖人曰先除欲以養精後禁食以存命是知食胎氣飲靈元不死之道返童還年此蓋聖人之所重也且夫一士專志下學而上達一夫有心睹天道之不遠學而無至謂之愚不學不知謂之蒙然三蟲未去子踐荆榛之田當三蟲已亡自逹華胥之國顯彰雲路備述胎仙知聖行之根源辨仙官之尊位至於霞衣羽服玉館天厨蓋為志士顯聊泄天戒非人妄告殃爾明徵密此聖門必登雲路愼無傳於淺學誓莫示於斯文慢而折神輕言損壽若非志士無得顯言總一十八章列成一卷號曰胎藏中黃經皆以篇目相銜文句相繼義精於成道言盡於養生行顯意直事具文切食氣之理備載歸天之道悉成援筆録章列篇於後
