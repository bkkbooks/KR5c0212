body:
  text: 九仙君撰中黃真人注內養形神章第一內養形神除嗜欲內養形神除嗜欲者乃無相之真形也太上言真道養神偽道養形將靈谷元神入於天谷之中密固根源養之耳大洞所言人有三十九關斯天谷穴乃是第一關也太上曰若守我在於死氣之關令七祖枯骨皆有生氣故言內養形神除嗜欲也洞元經云修養之道先去於嗜欲內合於五神次當絶粒心不動搖六腑如燭常修此道形神自定專修靜定身如玉神與物交心似太虛安鎮本根自然靜定夫人心起萬端隨物所動常令靜居不欲與衆混同內絶所思外絶所欲恆依此道元氣自足但服元氣除五穀世人常以五穀為肌膚不知五穀敗身之有餘令取春三月淨理一室設機案建以厚暖牀席案上常焚名香至夜半一氣初生之時乃靜心神當叩齒三十六通以兩手握固仰卧暝目候常喘息出時合口鼓滿依法咽之入腹當覺作聲以飽為度飢則更咽但當坦然服之無所畏懼氣入之後如覺口乾則服三兩啜胡麻湯此物能養氣潤腹其湯法取上好巨勝三大升去皮九蒸九曝又取上好茯苓三兩細研為末先下巨勝末煎三兩沸次下茯苓末又煎數沸即入少許酥蜜遇渴時飲一兩盞佳不惟止渴兼能止思食之念或服四時枸杞湯時飲一兩盞亦善其咽氣自然得通暢但覺腹中安和咽氣自當流滑即一切湯水自然不要吃漸通妙理但能服氣攻盤於腹腸糞自盡如入湯水直至臍下初服氣者如覺小便黃赤勿怪也心胸躁悶亦無為懼但心定不移自逹妙理若不絶湯水雖腹腸中滓盡終不得洞曉是非若要絶水穀只在自看任持亦不量時限遠近亦有一月或五十日亦有一百日但絶其湯水者三丹田自然相次停滿三十日下丹田滿六十日中丹田滿九十日上丹田滿下丹田氣足藏府不飢中丹田滿者氣滿體無虛羸上丹田滿者凝結容色殊光肌膚充盛三焦平實永無所思神凝體清方曉是非下丹田滿者神氣不泄中丹田滿者行步超越上丹田滿者容色殊麗既得三部充實自然身安道泰乃可棲心聖境襲息胎仙此為專氣之妙門求仙之上道也若或食或斷即令人志敗好食諸味難遣穀氣此者襲氣之所疾求仙之大病也經云鹹美辛酸五藏病津味入牙昏心鏡致令六府神氣衰百骸九竅不靈聖人能堅守禁絶諸味嗜欲者九十日三丹田凝實百日內觀五藏三百日鬼怪不藏形陰神不敢欺千日名書帝籙形入太微矣必獲寥天得真籙凡飛鍊上升為下天仙官若存想無為氣神修三一之道者得上天仙官若真子服胎息成者得寥天升真籙千乘萬騎迎子當獲中天真尊之位百日專精食氣足謂三丹田氣足也凡食氣吞霞言是休糧蓋非旦夕之功先以德行護身次以除陰賊嗔怒此學道之志也陰賊未除三蟲不去或行非教之事不復成矣故太微玄章云除嗜欲去貪嗔安五藏神足矣食氣玄微章第二食氣玄微總五事夫言玄微者乃無為玄妙之理言五事者但學絶粒則魂魄變改三尸動搖者也大關之要莫能知夫人內行未成不知諸魔相違謂言道法無效蓋不達真理也若是先具內行仁德只服津液尚有安和况於服氣之哉一者初服力尚微凡初服氣為有滓滯至一七二七日以來滓穢退出漸覺體內虛羸百節無力勿以為訝緣元氣未逹腹胃中所以覺虛弱但咽氣使漸通流日勝一日但當堅志守一候下丹田滿足頓無飢渴假令未達皮膚容色黃瘦亦勿以為畏後當悅懌矣如不專志兼食行則用力無效也亦愛數敗則此為不具內行之人則如此也若但有愛緣牽心自使敗但常堅志守一候一候者乃下丹田氣住漸至滿足則是也既下丹田氣足永無飢渴若畏力微瘦黃者不能修也若穀水絶則日久自然悅懌自下來也要子將心運守之太玄經曰凡休糧諸門甚多學道至近須九年以下無成者也唯有服氣堅守百日禁諸湯水子心不動三尸自除永無敗矣只為學者浮心未定居二疑之端使心神動搖三尸齊起百思既至心迹難歸雖服氣易為退敗猶預必不靈聖者也二者穀存子何别氣則難停而易泄夫體服氣欲速達五藏可除湯水藥物禁斷四十九日使小腸滓盡穀氣自絶咽氣自得通流亦有不成者多為學人心容變易或食或止故自敗矣若少食諸味則難遣穀氣若要用氣使內藏分明當服此元氣五十日百物不食閉目內想脾藏中氣從心起散於四肢仰卧咒曰中央戊己內藏元氣黃色力堅運之可理丹陽莫辭朱雲共議得達四肢黃雲大起每至五更雞初鳴時常候莫令參差如此二十七日內見脾藏中氣鬱鬱如黃雲透於四肢後當使此氣滅燭吹火百步外使之如大風起可以興黃雲閉彼形人無見者若不依五更初及不堅守或少一日無效矣此者中黃閉氣之法也或則體弱而心虛或則藏虛而力劣用氣未達四肢當有虛弱之證但堅守志勿以為恐矣故大洞經云守之如初成道有餘者矣三者上蟲居腦宫洞神玄訣云上蟲居上丹田腦心中是也其色白而青名曰彭琚使人好味嗜欲癡滯學道之人宜禁制之假令未絶五穀常行此心持念一年之外上尸自終亦有成矣人不知玄奧空絶五穀若不除貪欲之心者焉得三尸蟲滅矣萬端齊來搖子心常思飲膳味無窮想起心生益病容夫學道者若不得內行扶持身心却反為三尸蟲所惑亂也四者中蟲住心宫洞神玄訣云中蟲名彭質其色白而黃居中丹田使人貪財賄好喜怒濁亂真氣令三尸變易七魄流蕩故洞玄經云無喜無怒三蟲大懼不貪不欲和氣常足坐見元陽萬神來集者也遣子魂夢神飛揚或香或美定無方或進或退難守常精神恍惚似倡狂令子坐敗想餱糧子若知之道自昌怡然不易其道自常矣五者下蟲居腹胃下尸其色白而黑名曰彭矯居下丹田使人愛衣裳耽酒色學道之人當心識內安堅持制之尸鬼無能為也及無敗矣令子淡泊常無味常守淡泊三尸自滅三尸既亡者永無思慮矣靜則心孤多感思撓則心煩怒多起夫初服氣未通被三尸蟲攪亂或則多喜怒或則多悲思或耽嗜欲滋味者也使人邪亂失精理子能守之三蟲棄太上升玄經云若服氣絶食堅心經一月一蟲自去二蟲無託人能但服氣堅心守之三十日上蟲死六十日中蟲死九十日下蟲死百日心不移則自然身體康健精神清矣永無退敗若或食或斷令人志敗徒勞而無效當守持之得見五芽九真氣五芽者乃五行之正氣生於五藏之中九真者為九天之道也此五氣成還應九天所以五藏之氣名九天也元氣成當自然得明五行之氣驅使無不通者也五芽咸惡章第三五芽咸惡辛酸味若五味不絶五藏靈氣不生終不斷思欲之想亦可止思欲之念及絶水穀外味之物則何慮不生五氣五氣既生則五情易暢五藏既滿元氣自凝元氣既凝五神自見五神既見備曉人間好惡是何世俗之慮能牽者乎為有三蟲鎮隨子尸鬼坐待汝身死何得安然不驚畏三尸之鬼常欲人早終在人身中求人罪狀每至庚申之日上白司命若無驚懼不早修煉形神絶制五味使人年敗氣衰形神枯悴空有松筠之志無復成矣一朝命絶悔將何及者乎勸子將心捨凡事服氣大要者須靜持心神止捨煩務使三尸自滅神氣而行自然通達五神獲安妙理也超然自得煙霞志能清淨神氣則志自潛明超然洞悟有煙霞之景在乎目前煙霞淨志章第四煙霞淨志通神奧若得水穀氣除自然諸脈洞曉五藏靈光化生縱捨自在深奧故不可測也靈光者乃神氣也令子坐知生死道若能制絶諸味百日之後無不知矣自得衆靈潛伏生死之路備睹機覽天外陰司之道恆知者也蒸筋暴骨達諸關握固潛通百竅間謹按胎息至理經云凡服氣五十日假令未絶水穀每遇日色清明時景朗耀於正午之時當入靜室厚施軟褥牀席散髮低枕握固於兩肋之傍叩齒七通端心暝目似覺微悶則須用力閉氣握固使漸漸筋脈舒開靈氣潛通骨肉之間津汗潤澤於皮膚之內但當數數運用自得顔色悅懌氣力兼倍髮如沐漆髭若青絲如不解閉氣煉形運用元氣通流潤澤於皮膚之上終不得自在若氣行通於毛髮之間自然鬢髮跳躑若不得此法雖絶粒長生亦同瓦礫草木無精光者也百竅關連章第五百竅關連總有神百竅通於百穴百穴通於百脈眼上有二穴通於肝脈肝脈通於心故心悲而淚腭上二穴通於鼻脈通於心脈故心悲則鼻酸鼻脈復通於腦脈故腦熱而鼻乾洞神明藏經云百脈通流百竅相生百關相鎖百節相連故一穴閉則百病生一脈塞而百經亂故服氣無疾諸脈自通道人不死乃胃腹中無物停留也鑒察吉凶百神歸集於體寒熱不近元氣調伏於身衆毒不干五藏靈神固護猛獸不搏土地常自衛持隱顯自在骨肉合於玄牝去留無滯無所不通自然達於真道何慮不契通於聖智哉由子驅除歸我身百關九竅皆有神宅也藏腑無邪氣所生則萬神歸集邪氣即穀氣是也若正氣流行所有瘡痕點黶客氣自然消滅者也恬然得達自明真故得洞鑒昭然足辨邪正之類自明真道永長存致形神於不死之門升子身於九天之上長存之道章第六長存之道因專志精專用意則可通於聖理返荷三魂知不死氣通之後當自荷形神明不死之路者也何物為冤七七裹服氣滓盡後絶水穀最功者在四十九日漸當百脈洞達返照如燭俗心頓捨五藏恬然若不堅持前功併棄再理何可終不成道而矣堅然愼守酸鹹味食諸味者難遣穀氣鹹美辛酸章第七鹹美辛酸五藏病津味入牙昏心境但是五味入牙皆通於兩眼之穴散霑於百脈之內使穀氣堅實藏府停留若求速達者尤宜卓然斷絶也致令六腑神氣衰百骸九竅不靈聖為神氣不凝丹田之中靈光不照於藏府之內也子能愼守十旬中諸脈洞然若明鏡使功滿十旬終者神氣自當凝實靈光焕耀如燭無不洞達者也六腑明神不隱藏與子語言説心境五藏神自見也滯子神功去路難大都穀實偏為病若穀氣不除終不見幽玄至理也若能絶穀水者自達玄境也穀實精華章第八穀實精華與靈隔纏羅六腑昏諸脈穀實精華化為涎膜纏羅五藏六腑關節筋脈故不可得知但是服氣之人經五十六十日後見腸胃中滓盡將謂更無别物不知穀氣精華殊未出也所以有思食慮散之意反變情切心懸不可堪忍亦為尸鬼所動之禍也自後但有物出如膿如血或若壞腸脂或若雞鴨糞此乃穀氣欲出有此狀也後更三二十日又有異物出如涎如膜此則穀實精華之狀也若先曾兼食服氣或斷或絶或修暫上經歷歲餘一旦頓絶還效便成若無諸狀候亦不怪也但無穀氣則氣通達百脈洞明返照如燭大洞經云初服氣之人亦覺腸中滓穢盡只見所食湯水旋於腸中胃腹內更無别物不知穀氣自出也若穀氣絶盡則更無所思想念形神恬然藏腑安泰自無思慮寂寞瘦弱等疾也若遇有寂寞羸弱不可懼而退生及不進之憂必審而思之無得退也若能頓絶湯水三十日以來稍生絲毫疑慮不一之心退志不能堅守者永無成矣有似穿井及泥見水而不取也苦哉痛哉大苦哉大痛哉元氣不返何所依子心未達焉能測穀氣不除於藏府之間元氣不降於丹田之內故道者昧然不知神功在近者也愼之可惜玄宫十二樓那知返作三蟲宅若不修煉形神身中宫室皆為三蟲之窟宅也三蟲宅居章第九三蟲宅居三部裏此三蟲常在三丹田中也子能運用何憂死但依聖人之言用心修持何慮殃纍之患所及也慓然鬱鬱常居此元氣常引內氣既周流於身中則上下通和却復三丹田之內也自辨元和九仙氣穀實之氣既盡則元和之氣自然辨識者也九仙真氣章第十九仙真氣常自靈三蟲已死復安寧大洞玄經云三尸既亡神氣自昌百日之內可以驅神及照五藏元氣使之如神聖者也若居世遊隱法具在胎息章中説也由子運動呼吸生神氣若足呼吸運動興雲起霧自然得隱化無滯無礙也居在丹田內熒熒服氣成者丹田氣自平實可上升下遊三丹田中凝納若雞子炳焕如燭光照數里無不耀赫為丹田神氣之妙此也筋骨康強體和平三光經云煉髓如霜易骨如鋼服之千日力倍於常復能日行千里奔馬不及如神者矣靈識恬然自暢情思逸神高心彩明食氣既實者心神常自暢悅情高思逸棄賤人間者也却聞五味氣膻腥視五味見滓穢視五香聞膻腥尋苗見根道功成者故有是聞自然如此為天氣達於自身者也俱有此見也哉肌膚堅白筋骨清胎息章中自有煉骨法具載也地府除籍天籙名坐察陰司役神明內合胎仙道自成服氣成者當自察知陰府役使神明若入胎息至於百息者當身入異境地籍除名服至千息者三天籙位魂遊上境也太清中黃真經卷上
