front:
  text: 太清中黃真經卷下盡二
  hash: sha256:9b775dbb76c3578f3707e10922dfdddef6547d998357077dc086099f06fbcc95
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0212_HFL_012-001a, image: hfl/0568/0568-019.png}
body:
  text: 胎息真仙章第十一胎息真仙食氣得却閉真氣成胎息服氣經云一百日五臟靈踈方可入胎息准九天神經云先須密室無風厚軟氈席枕高四指方與身平用一志人同心道侣捐捨凡心握固仰卧情無所得物無所牽靈氣漸閉心識怡然初閉經十息至十五息二十息百息只覺身從一處如在房中只要心不動移凡一日一夜十二時都共一萬三千五百息故太微升玄經云氣絶曰死氣閉曰仙魄留守身魂遊天上若閉氣至百息魂神當見其魄者緣是陰神魂者陽神且陰神常欲人死不欲人生其神七人衣黑衣戴黑冠秉黑璽洞神經云為之玄母此神是陰尸之主若見此神子當謹心存念咒曰玄母玄母吾尸之主長骨養筋莫離尸去吾與魂父同遊天去次當見魂父有三人各長一尺五寸衣朱衣戴朱冠持朱璽當引上元宫見諸腦神百餘人出子身當見三丹田中元氣如白雲光照洞達子當謹呼三魂名一曰爽靈二曰胎光三曰幽精得此三魂陽神領腦宫諸神萬萬千千引子元神遊於上天當出之時但覺身從氣房中出當見種種鬼神形容之狀或偉大者數丈或微小者如燕雀或披髮若亂蓬或開眼如張電緣為上界之道皆是鬼神之過路子但當安心定志勿生怪畏自達安境如一切無所見者最為上也但黑白分明是善相也所以須要得良友相伴相助緣元氣上與魂神相應切慮定息之時别有所見心則不安元氣當自口鼻中出則故子身不得去也但一夕之中令傍人或自記喘息數至千息子當與三元神同遊上界也其道當成其道既成之後不得微有泄漏神理最為上妙大忌大忌大愼之大愼之不可有漏泄於人也但不顧於物不生異心鬼神及魔自伏其德羽服彩霞何所得皆從五藏生雲翼煉形上升自化成五色羽衣中天羽經云輕輕狀蟬翼璨璨光何極蟬為飲露食氣而故生羽翼人服元氣而天衣下凝於體則可知也五藏真氣章第十二五藏真氣芝苗英太華受識經云元氣舍化布成六根吉凶受用應行相從內氣為識胎氣為神子能胎息還嬰返魂也五藏之始先布於水內有六府外應六根肝主東方其色青太明五緯經云肝主於木生於水尅之於土來自東方其色青蒼受之於陽潜伏此氣千息生光但常用氣未至胎息當存想青氣出之於左脅但六時思之不輟自子時常隔一時思之至五十日當見此氣如青雲用此氣可理一切之人熱疾時行癰腫疥癬及瘦但觀前人疾狀量其淺深想此氣攻之無不愈瘥如觀前人患肝經之病面色枯悴則稍難理之不可治也子但閉固經千息青色周流色自然胎息經云千息色青內自凝結者也心主南方其色赤服之千息赤色出太明五緯經云心主於火生之於木尅之於金來自南方其色赤受之於朱陽為夏天也潜伏千息當出心堂常服氣未至胎息者常以每至午時想赤氣自心存如雞子許漸漸運赤氣從頂而出出者自散存之咒曰南方丙丁赤龍居停陰神避位陽官下迎思之即至用之即靈自此三咒之常行此氣勤誠存想五十日不關當有赤氣如火光自見用此氣可理諸人一切冷病使氣攻之即瘥愈而矣如患人面色帶青者乃陰氣不可治也凡存咒想神氣法者並忌他人知之肺主西方其色白服之千息其色極太明五緯經云肺主於金生之於土尅之於木來自西方其色白澄淨微芒潜伏千息光明洋洋常服每至丑時存想肺間有氣狀如白珠其光漸大上注於眉間存之咒曰西方庚辛太微玄真內應六府化為肺神遊於丹田固護我命用之神仙急急如律令存念一遍如此四十九日肺中有氣如白雲自出此氣可照地下一切寶物及察人之善惡示表如裏如不存想此法服氣三年方見五藏內事此緣不具真行使用不辨相尅相生如寒用心氣緣是火氣如熱用腎氣緣是水氣不達此用氣則亦無效也九氣經中亦不言氣法寥廓尚祕况是人間者也脾主中央其色黃服之知千息其色昌太明五緯經云脾主於土生之於火尅之於水來自中方其色黃閉服千息但當一日一想不限時節亦無咒法其脾藏存之四十九日自見此氣脾中而出已後可將身隱入墻壁無所礙也腎主北方其色黑服之千息其色得太明五緯經云腎主於水生之於金尅之於火來自北方其色黑伏之下元主持命房內有真白守之不忘此五藏神氣但至五更初各存想氣色都於頂上不必一一别存想兼不用咒法亦得只是校遲百日後其色已成立可用驗也驅役萬靈自有則服氣心志兼持內行內外相扶元氣充滿五藏及丹田之中至周年之後應是世間鬼怪精魅及土地神祇並不敢藏形所在之處地界神祇自來拜迎常隨衛道者陰司六籍善惡之事俱得知委然亦不可便將驅使緣未具三天真籙慮有損折若入胎息得升身訣者但要游人間當依此經尸解法自然遊世即無遮礙而已不爾未可忘道也若不務此術者但務化人而已自他俱利者也乘服彩霞歸太極胎息伏陰經云內息無名內行相成若不持戒行未入胎息豈得合神若人未入胎息如要游人間者可行尸解之衍太微靈隱書曰凡人未入胎息及已入胎息者要游人間俱可行尸解之術隨物所化故有託衣衾所化者常以庚辛日取庚時於淨室中所卧牀頭須設機案焚名香一爐下著柱者龍杖及履鞋等物盡安置於頭邊身不解衣衾及以衾蓋之首西而卧自念身作死人當暗念此咒七遍咒曰太一玄冥受生自靈七思七召三魂隨迎代佘之身掩佘之形形隨物化應化而成急急如律令咒畢此法存念一食之間但當依尋常睡卧如修之日存念之起輒不得與外人語言忌之若與人言者其法不成如此常行四十九日漸漸法成既成之後或要作則不問行住坐卧暗念此咒七遍隨手捉物自身便去衆人只見所執者之物化為己身身將已死矣後却見物還歸本形此法即可以下界避難助身不可為非道之事大須愼護其法大須隱默若卧在牀上但以被覆其身隱化者暗念咒一遍便却去他人只見所卧衾被是彼形死尸却不見衣衾法成大忌財色留心神明誅折也太極真宫章第十三太極真宫住碧空絳闕崇臺萬萬重玉樓相倚列危峯上界宫館生於窈冥皆五色之氣而結成下界土地皆是水氣橫凝而扶住故不得自在不得堅長不得平正上界以八珍為土地七寶為用器至於宫殿七珍合成有自然不運之力無人興動用之功上界以七珍精氣為日月下界以陰陽純氣為日月下界言一年三百六十日是上界一日十二時也太微玄經云不食土地精生居太一城此為形神俱得去也瑶殿瓊光彩翠濃紅雲紫氣常雍容玉壁全楹內玲瓏玄宫玉堂經云白玉為壁黃金為柱青珊為梁紅玉為牀為七珍翠彩焕爛光徹內外無礙千閣萬樓互相影對大仙真人猶居此之外者也鳳舞鸞歌遊詠中上界有天鳳之舞鸞霄之歌皆是曲名者也玉饌金漿任意從九宴玄厨經云一日十進九霄之膳七獻八瓊之漿一日十進七獻酒也九氣真仙位列崇服胎息成者得列九真上仙矣九氣真仙章第十四九氣真仙衣錦衣綃穀雲裳蟬帶垂真君衣瓊文錦蟬翼之衣者也天冠搖響韻參差冠搖衆珮響亮五音之韵為自然也九文花履錦星奇九文錦為履其花零亂如衆星攢璧者也却佩霓裳朝太儀霓裳仙官朝服也初得仙皆朝太儀真君九天之主也十方彩女執旌麾百靈引駕玉童隨前有龍幡後虎旗前朱雀後玄武左青龍右白虎皆是百靈之數也羽服飄颻八氣吹八氣乃八方之正氣也先治道路而矣更上寥天入太微太微九天都在第五天金星輪朱華宫轄日月五星神宿行運之時亦管下界生死之籍奏聞太微凡此官吏曹署約四十萬局衆大數也太微玄宫章第十五太微直上寥天界動靜風調鳴竽籟太微上界所有風搖皆如笙簧之韻極樂之所自然如此殿閣穹崇何杳隗杳隗謂虛峻極也殿閣重數甚多橫壯尤麗而矣壽永衣輕人體大九天各各皆相倍九天羽服儀仗各相次加倍羽衣轉輕人體轉大彩翠鮮華日月轉邁長遠也是謂因心得自在因心運身得出三界也靜理修真為聖人九行空門列真載夫九行者道人之窟宅也動息住持不離其內一者為以慈慜為衣二者以止捨為食三者以正心為乘四者以專志為財五者以謙下為牀六者以順義為器七者以勤慧為窟八者以修空為宅九者以陰施為業修道之子不持此九行去道至踈遠矣九行空門章第十六九行空門至真路大道不與人爭怒動息能持勿暫停陰神返照神常助持心不息其道易成諸行無心是實心因心運得歸天去無心之心因心運心道雖無心還因心有除垢無心是謂真衆事曰垢無事曰除除心止念萬行歸余也自隨胎息入天門胎息以善行為要機以無念為至路者也玄元正理內藏身無曲潜形體合真洞玄經云心無曲萬神足三部清虛元氣固六腑翻成百萬神三元靜則六腑調真氣歸則萬神應二理相合五藏六府諸神共有百萬之餘自然顯現相和應也六腑萬神章第十七六腑萬神恆有常五藏六腑百關九節有神百萬若日常清淨修之即當自見矣大腸之中主肺堂腑為首三焦之主也元和淨理穀實盡但以元氣攻運何慮穀氣之不去中有靈神自隱藏藏府既淨萬神自藏故太明經云大腸主肺也鼻柱中央為腸重一十二兩長一丈二尺廣八寸在臍左邊曲疊積一十二盤貯水穀一斗二升主一十二時內有神各具本色衣冠一十二人若除水穀氣盡元氣自足其神當見各於本時遞相護衛修道之子者也腎腑當明內宫女外應耳宅為門户內神經云精主腎腎為後宫內宫列女主腎耳之宫承氣於耳也左腎為壬右腎為癸循環兩耳門中有神五百人內有元神守之都管兼主志智凡人好嗔怒則傷腎腎傷則失志失志則喪道之本也元神亦散修行之人大忌嗔怒道成則內神常見於人衛道者也膀胱兩腑合津門氣海循環為要路膀胱是兩腑為津門腎合於膀胱乃受津之府上應於舌根也津液往來常潤澤肌體舌岸以應兩膀胱氣少則不潤服氣之人常欲少語以養津液故語多則口乾口乾則難用氣也中有神三百六十人以應一年之數氣成當見其神常抱無貪之行故道者不貪志合神理大洞升玄經云行合神見道成歸天此神人行胎息即自出常以護衛人近道也子當得見內神彰終身不泄神常助終始不泄天神助子勿泄天機章第十八勿泄天機子存志凡是天章無輕示凡遇天經子莫輕泄當志愼之三十三篇世絶知况復中黃祕中祕道有胎光經三十三篇禁絶不許妄傳况兹中黃靈句祕之特重愼之愼之者矣先禮三真玉仙使然後精心睹文字教令科云欲開示三真等經先須擇甲子日淨室焚香心存南華真人念九天真聖三天真君同開作證首東作禮四拜方許開示然後云某為求道輒開九天大聖真文傳示一遍故得百靈同助身歸太無名入天户不得示於三人切忌容易泄漏若不依經教妄開示者及如睹常文必有殃責非淺獲過不輕矣違教身罹非橫殃子孫受禍當須忌餘殃明罰世世子孫受禍大忌大忌太清中黃真經卷下
