front:
  text: 北極眞武普慈度世法懴卷之二
  hash: sha256:b1047cbf2903d00a7a83c11b3aca8c0a482b86f1aeda8afb6c6b943b8f9b75b4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0212_HFL_002-001a, image: hfl/0567/0567-058.png}
body:
  text: 歩虚爾時妙行眞人告諸仙曰謹按洞眞本行經云玉帝者乃元炁之祖造化之根靜而聖即元始天尊動而神即玉皇上帝居玉清宫通明殿統御萬天化育羣品萬彚之主造化之原在天爲衆聖之尊在世爲萬教之主而老君者道之應形名號無邊洞眞極聖本無常形消則爲氣息則爲人或於太虛之中凝爲眞容體大無邊相好備足上無所攀下無所躡或在雲華之上身如金色髙眞侍衛百靈宗奉或坐蓮花之内建七曜玲瓏之冠披九色離羅之帔項負圓光照耀天地處寳臺金殿珠玉帷帳萬帝朝禮神兵衛軒或金容玉姿黄裳繡帔或素服玄冠乗朱鬃白馬或下治十天封掌兆民居紫微勾陳房爲天皇大帝或春夏秋冬變化無量此則返金闕之炁更受煉飛玄通神之精也故化身爲眞武其神通自在隨感則現能白能黒能方能圓能屈能伸能脩能短能老能少能一能萬縱横反覆厥體靡常亘古窮今歷代演教接引九界濟度無邊臣等歷世多縁幸親至教詳明經典與善因縁欽奉上眞知歸有自一心發念皈依敬禮志心朝禮虚無自然元始天尊志心朝禮玉宸道君靈寳天尊志心朝禮太上老君道德天尊志心朝禮玉虚師相玄天上帝志心朝禮聖父明眞大帝志心朝禮聖母瓊眞上仙志心朝禮聖師豐乾大帝志心朝禮西國紫玄元君志心朝禮金闕化身天尊志心朝禮玄元顯應天尊志心朝禮太清靈變天尊志心朝禮髙上玊眞天尊志心朝禮日光開瑞天尊志心朝禮武曲應化天尊志心朝禮虚星應化天尊志心朝禮危星應化天尊志心朝禮天一應化天尊志心朝禮太一應化天尊志心朝禮辰星應化天尊臣等志心皈身皈神皈命玄帝顯靈應化諸尊上聖臣恭承太上垂訓曰夫人生天地之間善惡不同各自先身業縁所致修善善至修福福來如影隨形似聲應響悟則見道迷則居塵有如寳珠照鑑隨物又如明鏡黒白自彰若修十善克感天神扶護世族克昌後世衣食自然無窮夀量若修十惡凶神降附苦病切身輪轉受生應諸惡報謹按修眞第二戒云不得殺害含生以充滋味切慮弟子某一眞乖本百念俱非求適口之肥鮮稱快心之爽美捕獵投林之獸搜邏飛野之禽挾弓馳射於山間設網低沉於水底託合藥祀神之故及佞官媚貴之爲煑宰烹炮燖煿炙烙豈念輪迴於惡道安知人物之一途或眷屬以業報而攺形或姻親以罪縁而受果反飡其肉欲潤爾身不復識知未能傷愍殺害愈甚舉動成愆上來諸業見在世中疾體纒綿夀命夭促死墮地獄長劫受苦苦盡復生遂入惡道報盡復還生於茲世以前業報尚有餘殃受報未已今則聞經所說深可憂惶仰對聖前恭投懴悔皈命一心䖍誠信禮志心朝禮上通無始天尊志心朝禮上極無窮天尊志心朝禮上及無間天尊志心朝禮上象宗無天尊志心朝禮上契太元天尊志心朝禮上炁通和天尊志心朝禮上理存虚天尊志心朝禮上造無違天尊志心朝禮上逹至理天尊志心朝禮上教不言天尊志心朝禮上清理炁天尊志心朝禮上繼元迹天尊志心朝禮上奉至柔天尊志心朝禮上明嗣寂天尊志心朝禮上宗無問天尊志心朝禮上光有益天尊志心朝禮上宗四白天尊志心朝禮上洞元靈天尊志心朝禮上靈髙妙天尊志心朝禮上文演法天尊志心朝禮上元陽照天尊志心朝禮上寳紫微天尊志心朝禮上致希夷天尊志心朝禮上證五果天尊志心朝禮上登無極天尊志心朝禮上妙通神天尊志心朝禮上興法理天尊志心朝禮上致不殆天尊志心朝禮上慕大成天尊志心朝禮上惠不窮天尊志心朝禮上好清樂天尊志心朝禮上學日益天尊志心朝禮上澄無累天尊志心朝禮上無攝有天尊志心朝禮上建廣德天尊志心朝禮上隆教法天尊志心朝禮上行正法天尊志心朝禮上化無迹天尊志心朝禮上教去有天尊志心朝禮上德無盡天尊天尊上聖禮念旣周再竭一心遥瞻神府皈命紫皇眞一天慶宫元和遷校府北極佑聖院諸眞仙衆今日道場大衆䖍叩教主北極鎭天助順眞武靈應福德眞君玉虚師相玄天上帝伏願垂象鳴鸞驂龍馭鳯洞昭感格普救生靈奉爲弟子某求懴上來所犯第二品戒殺害舍生以充滋味之罪或先世今生遺殃徃劫上延祖考下逮宗親或處口傳言殺或延賔養已殺或手揉脚踏殺或目擊耳聞動作殺或故殺誤殺狠戾有毒殘害無辜求取膏粱貪嘗筋血罪將條列惡巳貫盈撓亂靈司紏録不已今憑懴力願賜寛原顒望上眞宣恩勑下所部考官考吏考兵考士一切玄司曹桉主者廣行慈憫願賜赦原求懴弟子某并法衆等遵奉玄科入道登眞戒當行隂德廣濟羣生誓從今去心懷慈惠志務善修剖析藩籬解除羅網痛憐衆命常存救援之思愛同一身不恣殺傷之欲即斯發露徑此懴陳伏願金書錫賛衞之休玉簡賜安寧之慶削故殺誤傷之罪拔積𡨚理對之仇變化人身脫離業障償報之愆盡滌顯幽之際俱安常奉至眞永依玄教以斯利益遍悉莊嚴上願寳鼎尊隆金枝蕃衍公侯効勤而盡瘁官僚秉節以輸忠任以無私論道經邦而無異施於有政安民濟衆之有餘一切有情同登道岸北極眞武普慈度世法懴卷之二
