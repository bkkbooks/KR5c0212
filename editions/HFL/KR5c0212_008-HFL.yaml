front:
  text: 北極眞武普慈度世法懴卷之八
  hash: sha256:e6e76474a18869153d8100867c87a5fd4154e6a686e0adacddb8aca5aeea9178
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0212_HFL_008-001a, image: hfl/0567/0567-142.png}
body:
  text: 歩虚爾時太玄眞人於金華洞天遇太上降駕啓問不言之教太上曰天致其髙地致其厚日月照星辰朗非有言也正其道而物自然隂陽四時非萬物也雨露時降非養草木也神明接隂陽和而物自生矣夫道者藏精於内棲神於心靜漠恬淡恱穆胸中廓然無形寂然無聲乃感朝廷晏安官府清謐林無隱士野無逸民無勞役無𡨚刑天下莫不仰上之德絶國俗莫不重譯而至非家至而人喻之也推其誠心施之天下而巳故賞善罰惡者政令也其所以能行者精誠也政令雖明不能獨行必待精誠精誠形乎内外浹於人心此不言之教也聖人在上懷道不言而澤及萬方故不言之教茫乎大哉是以人主之思神不馳於胸中知不出於四域懷其誠心則甘雨以時五榖蕃殖威厲而不試法省而不擾囹圄空虚天下一俗祥雲興景星見黄龍下祥鳯至醴泉涌出嘉禾秀生海不揚波矣若逆天暴物則日月薄蝕五星失行四時相乖晝晦宵光出朋水涸冬雷夏霜天文變異國土不安盖天地之道與人有以相通也聖人與天地合德日月合明與鬼神合靈與四時合信懷天心合天炁執冲合和不下堂而行四海變易習俗人皆遷善蓋不言之教也臣等生值明時欣逢盛世國王水土天地裁成感德荷恩懷戴罔極仰依眞教敢怠欽崇恭對威光志心朝禮志心朝禮虚無自然元始天尊志心朝禮玉宸道君靈寳天尊志心朝禮太上老君道德天尊志心朝禮玉虚師相玄天上帝志心朝禮聖父明眞大帝志心朝禮聖母瓊眞上仙志心朝禮聖師豐乾大帝志心朝禮西國紫玄元君志心朝禮金闕化身天尊志心朝禮玄元顯應天尊志心朝禮太清靈變天尊志心朝禮髙上玉眞天尊志心朝禮日光開瑞天尊志心朝禮武曲應化天尊志心朝禮虚星應化天尊志心朝禮危星應化天尊志心朝禮天一應化天尊志心朝禮太一應化天尊志心朝禮辰星應化天尊臣等志心皈身皈神皈命玄天顯靈應化諸尊上聖臣等恭承經寳太上垂訓曰上聖傳道應性離言中眞傳德寄言通理下迷傳經因言修習將來末代道德將衰若要修行但憑經教經者常也實衆生常行之徑路下界無經如行不由徑出不因門何可登渉且元始開圖之際在龍漢劫始青之中浮黎國内出書度人字方一丈八角垂芒告盟十天傳濟萬代藏之寳室典以玉郎視之不見其形盲者遂見聽之不聞其道聾者廼聞故得經教出興人世皆度若斷絶經書何異擿植索塗而行巳悟道眞方離言象未參道妙須藉眞經因經得濟如乗巨舟不溺波流超于道岸如此則衆生耳有所聞心有所淨靈有所轉性有所通即登覺悟謹按修眞第八戒云不得交游非賢居處雜穢以今弟子某等言念理由欲泯習與性移背違乎睦姻孝友之箴超軼乎䂓矩凖繩之誨親炙惟先於狎昵見聞寧有於琢磨聚結呼游羣居宴飲笑談非益强暴相凌端人正士之弗交匹婦愚夫之樂與中外捏成於闘訟後先迭起於嫌疑顚倒錯迷塵垢汙慢上來徃業見在世中昏蒙不立擯斥尤多死墮地獄長劫受苦苦盡復生遂入惡道報盡復還生於茲世以前業故尚有餘殃受報未已今則聞經所說大可驚惶仰對聖前恭投懴悔一心致䖍皈依信禮志心朝禮有無大混天尊志心朝禮有始開化天尊志心朝禮有德契元天尊志心朝禮有名制始天尊志心朝禮有物成象天尊志心朝禮有朴爲器天尊志心朝禮有象未形天尊志心朝禮有機潜運天尊志心朝禮有正得一天尊志心朝禮有言可建天尊志心朝禮有欲觀妙天尊志心朝禮有感若容天尊志心朝禮有眞不諭天尊志心朝禮有炁常冲天尊志心朝禮有念能忘天尊志心朝禮有萬能同天尊志心朝禮有法成大天尊志心朝禮有心無常天尊志心朝禮有常能明天尊志心朝禮有事宗無天尊志心朝禮有威可畏天尊志心朝禮有生不猒天尊志心朝禮有功不恃天尊志心朝禮有通三應天尊志心朝禮有智自明天尊志心朝禮有德化民天尊志心朝禮有受不貴天尊志心朝禮有大可逝天尊志心朝禮有化能守天尊志心朝禮有志强行天尊志心朝禮有教不言天尊志心朝禮有惟不累天尊志心朝禮有善不求天尊志心朝禮有微不守天尊志心朝禮有知不解天尊志心朝禮有情可得天尊志心朝禮有信可傳天尊志心朝禮有冲莫勝天尊志心朝禮有强來徃天尊志心朝禮有與無混天尊志心朝禮有能無用天尊天尊上聖禮念旣周再竭一心遥瞻神府皈命紫皇天一眞慶宫元和遷校府北極佑聖院諸眞仙衆今日道場大衆䖍叩教主北極鎭天助順眞武靈應福德眞君玉虚師相玄天上帝伏願蕆教降靈除邪輔正周行六合普護兆民今爲弟子某求懴上來所犯第八戒交游非賢居處雜穢之罪先世今生遺殃徃劫上延祖考下逮宗親情分妄投每皆理而傷道炁力威猛務好勇以誇雄或曠安宅而弗居或捨正路而不適措身多愧攘臂自矜孰云朽木之可雕但見枯根之易滅罪將條列惡巳貫盈撓亂靈司紏録不巳今憑懴力顒望宣恩勑下左司陽官右司隂官中司察官考官考吏考兵考士司禁定罪合部大神廣行慈憫並賜赦原求懴弟子某等同法衆等遵奉玄科入道登眞戒當行無欲勿執巳見誓從今去交須勝巳取友必端惡居下流惟行中道聞善則拜敢萌自任之私見惡則遷益守無偏之禮即斯發露徑此懴陳伏願福禄來崇災禍不作視聽言動出入起居常奉至眞永依玄教以斯利益遍悉莊嚴教雨旁周仁風逺暢人皆趨於正道世杜遏於邪謀一切有情同登道岸北極眞武普慈度世法懴卷之八
