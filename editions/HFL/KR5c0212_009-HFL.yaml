front:
  text: 北極眞武普慈度世法懴卷之九十同卷則十四
  hash: sha256:52d4156c69a0fb179067ffd80319b7e5d6f682e0d278e9e9d5662ab5fb46cb3f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0212_HFL_009-001a, image: hfl/0567/0567-158.png}
body:
  text: 歩虚爾時妙行眞人告諸仙曰吾自徃昔聞太上妙訓曰吾於無形無名鴻濛澒洞溟涬之中開道玄黄分靈散炁從大羅下生三境次生九帝爲三寳之玄津出三十六部爲三境之玄根次而三十二天三十二帝潜通開化下分三界傍貫璇璣二十八宿五星𨇠度以明五方清炁上騰爲天重濁下凝爲地中生爲人天地人物無不備焉故陽和正炁化生元君聖后仙妃玉女剛烈英勇之炁化生天丁力士神兵將吏隂陽五行之炁化生男女雜謬之炁化生飛禽走獸咸禀一炁萬種不同隨其化生受性各異出機入機一徃一返長勞造化仰頼甄陶臣今恭披經品實深負荷因言開示了覺前因省悟此身至于今日幸居人品之中知過知非恭禮天尊用祈大宥一心敬禮人各恭信志心朝禮虚無自然元始天尊志心朝禮玉宸道君靈寳天尊志心朝禮太上老君道德天尊志心朝禮玉虚師相玄天上帝志心朝禮聖父明眞大帝志心朝禮聖母瓊眞上仙志心朝禮聖師豐乾大帝志心朝禮西國紫玄元君志心朝禮金關化身天尊志心朝禮玄元顯應天尊志心朝禮太清靈變天尊志心朝禮髙上玉眞天尊志心朝禮日光開瑞天尊志心朝禮武曲應化天尊志心朝禮虚星應化天尊志心朝禮危星應化天尊志心朝禮太一應化天尊志心朝禮天一應化天尊志心朝禮辰星應化天尊臣等志心皈身皈神皈命玄天顯靈應化諸尊上聖臣等恭承經寳太上垂訓曰三元八節五臘十直甲子庚申本命之日一切仙眞四極十華三界四天玉童玉女金剛神王善惡童子上聖髙尊飛天歩虚持幢建節燒香散花執符把籙按行人間條録善惡若有衆生不作諸惡能修諸善持齋奉戒行道傳經建立壇殿開度天人施生布德講說大乗教化男女救度衆生天仙即將人之善簿奏上元始告下天曹即令隨功𥙷過或遷上天或至得道或有掌管職制簽書種種仙階隨功遷補得登聖境者亦由積善所及受茲福報若有衆生或爲官長酷虐萬民或恃豪强欺凌貧賤爲子不孝爲臣不忠裸露三光不敬三寳怨天罵地欺公循私殺害牲傷人異物十惡五逆三業六根結造惡因遞招業報天仙即將人之惡簿奏上元始告聞天曹遍下地府或令惡病或令死亡或值𡨚家或爲異𩔖或入地獄或入幽牢經歷劫年無由得出皆是人之作惡受報謹按修眞第九戒云不得不忠不孝不信不仁以今弟子某等切慮外邪交蔽下愚不移命義之戒不明言動之端浸泯指鹿爲馬將竊柄以弄權謂鳥曰鸞欲希恩而示寵博奕飲酒而不顧其養私財慕色而不念其親詈怒父兄讒譛師友違禮傷教好勇疾貧施爲屢誚於郷閭䔍敬弗行乎州里徇名失實悖行違言徙木予金償城易玉矯枉輙欺於人巳虚辭不畏於神明坑䧟賢能穽擠慈善毒痡庶𩔖虐害羣生上來徃業見在世中處事﨑嶇遭人凌忽死墮地獄長劫受苦苦盡復生遂入惡道報盡復還生於茲世以前業故尚有餘殃受報未巳今則聞經所說大可驚惶仰對聖前恭投懴悔志心朝禮大混凝空天尊志心朝禮大樸澄元天尊志心朝禮大器資治天尊志心朝禮大象無形天尊志心朝禮大冲隱名天尊志心朝禮大梵彌羅天尊志心朝禮大白光無天尊志心朝禮大梵妙有天尊志心朝禮大方不易天尊志心朝禮大乗全用天尊志心朝禮大羅曰上天尊志心朝禮大量開明天尊志心朝禮大行梵炁天尊志心朝禮大明普鑑天尊志心朝禮大洞眞源天尊志心朝禮大盈不溢天尊志心朝禮大順至逺天尊志心朝禮大黍縣空天尊志心朝禮大法周行天尊志心朝禮大數起元天尊志心朝禮大志自强天尊志心朝禮大不恃能天尊志心朝禮大僞不爲天尊志心朝禮大寡不逆天尊志心朝禮大曆無疆天尊志心朝禮大定有數天尊志心朝禮大言不辯天尊志心朝禮大䧺不成天尊志心朝禮大用無方天尊志心朝禮大汎可恃天尊志心朝禮大爲不爭天尊志心朝禮大强不息天尊志心朝禮大質不文天尊志心朝禮大威不武天尊志心朝禮大色一炁天尊志心朝禮大全四域天尊志心朝禮大可分時天尊志心朝禮大貴常無天尊志心朝禮大廣清虚天尊志心朝禮大禮無窮天尊天尊上聖禮念旣周再竭一心遥瞻神府皈命紫皇天一眞慶宫元和遷校府北極佑聖院諸眞仙衆今日道場大衆䖍叩教主北極鎭天佑聖助順眞武靈應福德眞君玉虚師相玄天上帝伏願厚澤無私靈光有煒鑑觀塵世覆佑愚氓今爲求懴弟子某求懴上來所犯第九品戒不忠不孝不信不仁之罪先世今生遺殃徃劫上延祖考下逮宗親事君非禮而不克盡忠與人弗誠而多行皆約罔忽親恩而頑狠觸犯長上以欺凌或多言數窮不能守中或用意大虐不能慈忍罪將條列惡巳貫盈撓亂靈司紏録不巳今憑懴力顒望宣恩勑下考簿檢籙執罰典刑紏過司非賞善紀籍隂陽典吏府署大神廣行慈憫並賜赦原求懴弟子某同法衆等遵奉玄科入道登眞戒當行遜讓以道接物誓從今去結纓靖難扇枕奉親克復禮以爲仁有諸巳之謂信四端有則兢兢恐名教之虧六典謹修惴惴盡檢防之道即斯發露徑此懴陳伏願化日昭垂道風丕變凡服膺於名節均被冐於恩庥落滅惡根殄掃邪魔之撓注題福籍增延久視之齡常奉至眞永依玄教以斯利益遍悉莊嚴道極恢宏德綿清淨積善臻於餘慶推誠立於良因獲依寳祚之尊安與天齊久更底璇源之深廣易地皆然一切有情俱登道岸北極眞武普慈度世法懴卷之九
