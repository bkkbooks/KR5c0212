front:
  text: 北極眞武普慈度世法懴卷之三四同卷則十一
  hash: sha256:3bf3dc6ea1bd43f68a354d4d2c4b1ef68baa8da1892ece4501122bb0f591bdc7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0212_SJB_003-180360a, image: sjb/18/180360a.png}
body:
  text: 歩虚爾時妙行眞人告諸仙曰夫三寳大有金書一炁分形三清出號太初溟涬玄極洪濛中有虚皇分置五劫曰龍漢曰赤明曰上皇曰延康曰開皇當斯時也天光未分清濁未判則知三老各布始炁化生四靈以定四隅周環六合日月運乎其中推成萬物明知玄武乃天一之炁五靈老君太隂天一之化混沌赤文載惟玄帝乃元始化身太極别體上三皇時下降爲太始眞人中三皇時下降爲太初眞人下三皇時下降爲太素眞人至黄帝時下降正上天開皇劫初下世紫雲元年歳當甲辰三月戊辰三日甲寅庚午時符太陽之精託胎化生淨樂國善勝皇后之腹孕秀一十四月即太上八十二化也淨樂國乃奎婁星之下海外仙國上應龍變梵度天玄帝産母左脇當生之時異香瑞雲地皆金色七歳俯察仰觀靡所不通潜心念道志契太虚願事上天溥福兆民十五歳辭父母受紫玄君無極上道越東海歷翼軫星下於武當山修道四十二年功成果滿白日上昇玉帝封爲玄武五百歳後攝坎离眞精歸根復命上爲三境輔臣下作十天大聖方得顯名億劫與天地日月齊并是其果滿矣臣等知因識果感德蒙㤙先地先天劫終劫始長勞造化仰俟裁成敢効藿傾葵專勤崇向一心發念稽首髙眞志心敬禮志心朝禮虚無自然元始天尊志心朝禮玉宸道君靈寳天尊志心朝禮太上老君道德天尊志心朝禮玉虚師相玄天上帝志心朝禮聖父明眞大帝志心朝禮聖母瓊眞上仙志心朝禮聖師豐乾大帝志心朝禮西國紫玄元君志心朝禮金闕化身天尊志心朝禮玄元顯應天尊志心朝禮太清靈變天尊志心朝禮髙上玉眞天尊志心朝禮日光開瑞天尊志心朝禮武曲應化天尊志心朝禮虚星應化天尊志心朝禮危星應化天尊志心朝禮天一應化天尊志心朝禮太一應化天尊志心朝禮辰星應化天尊臣等志心皈身皈神皈命玄天顯靈應化諸尊上聖臣聞太上垂訓曰凡世衆生自從有命善心因被外色侵凌躭諸愛欲遂乃障蔽善事積習惡縁若能攝動歸閑存心内覺悟空非色色想即空不作滛欲之愆悟我六炁之道當常檢身心每虞過失見諸經戒常懷畏愼毋入魔界自墜惡道謹按修眞第三戒云不得淫邪敗眞穢慢靈氣以今弟子某心猨縱欲意馬奔馳耳管絃鼓樂之音欣欣有喜目珠翠金瑰之色念念無忘恱遇紛華愛貪竒麗諠華淫佚居中不固於閨庭醉舞歌吟樂外惟遊於里巷罔念精神之凋耗第窮筋力以疲勞葉脫根枯灰飛烟滅致疾縈纏於喘促傳尸枉逝於伏連人道乖離鬼關淪没殆難超度空極吁嗟上來徃業見在世中行巳災屯受人猒棄死墮地獄長劫受苦苦盡復生遂入惡道報盡復還生於茲世以前業故尚有餘殃受報未巳今則聞經所說心切驚惶仰對聖前恭投懴悔一心致敬皈命信禮志心朝禮至道集虚天尊志心朝禮至神合無天尊志心朝禮至清澄寂天尊志心朝禮至元造化天尊志心朝禮至寧含靜天尊志心朝禮至寳吐虚天尊志心朝禮至音冠漠天尊志心朝禮至無應變天尊志心朝禮至柔無間天尊志心朝禮至靈無待天尊志心朝禮至靈若昧天尊志心朝禮至强不息天尊志心朝禮至盈若冲天尊志心朝禮至和逹常天尊志心朝禮至常發明天尊志心朝禮至公治事天尊志心朝禮至深固本天尊志心朝禮至慈施行天尊志心朝禮至美流言天尊志心朝禮至仁進善天尊志心朝禮至惟布化天尊志心朝禮至大圖難天尊志心朝禮至安持和天尊志心朝禮至誠不動天尊志心朝禮至學過衆天尊志心朝禮至公輔物天尊志心朝禮至智多治天尊志心朝禮至式深逺天尊志心朝禮至順反物天尊志心朝禮至善不爭天尊志心朝禮至化不辭天尊志心朝禮至微幾聖天尊志心朝禮至名不去天尊志心朝禮至見無欲天尊志心朝禮至聖覃恩天尊志心朝禮至德太玄天尊志心朝禮至眞長樂天尊天尊上聖禮念旣周再竭一心遥瞻神府皈命紫皇天一眞慶宫元和遷校府北極佑聖院諸眞仙衆今曰道場大衆䖍叩教主北極鎭天佑聖助順眞武靈應福德眞君玉虚師相玄天上帝伏願寳劒横空旌旗擁駕恢弘有願救度無邊今爲弟子某求懴上來所犯第三品戒淫邪敗眞穢慢靈炁之罪先世今生遺殃徃劫上延祖考下逮宗姻或見美質屬意貪汙或凌貧素捉人殘害或間喋母子攘奪男女或隔斷親踈眩惑賢良裸露三光穢觸諸聖背馳正道妄起邪謀眞炁消磨靈姿昏濁罪將條列惡巳貫盈撓亂靈司紏録不巳今憑懴力顒望宣恩勑下考校眞司廵按府署司非執罰典録大神廣行慈憫並賜赦原求懴弟子某同法衆等遵奉玄科入道登眞戒當行柔弱勿爲邪佞誓從今去内無愛想外絶妄爲視已同於視人好德甚於好色保存元炁一毫不敢以懷欺淨瀹眞心萬慮悉消而自守即斯發露徑此懴陳伏願天地水府之霽威上中下尸之釋罪身康氣定志得願從妙化弘敷永錫綿洪之祉至靈不昧庶全覆佑之休常奉至眞永依玄教以斯利益遍悉莊嚴國底蕃昌民臻泰定坐蔑抗衡之變行占奠枕之歡樂業安居寧有詐祖之習祈天永夀曽何駭馬之虞一切有情同登道岸北極眞武普慈度世法懴卷之三
