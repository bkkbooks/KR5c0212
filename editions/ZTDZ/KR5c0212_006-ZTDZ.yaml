front:
  text: 北極眞武普慈度世法懴卷之六
  hash: sha256:1933ef73821b2a32bf1ba4735e42569d07783ee765995ad893e514917c7faeef
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0212_SJB_006-180367a, image: sjb/18/180367a.png}
body:
  text: 歩虚爾時妙行眞人與諸仙子曰昔九疑山女眞王妙想朝謁精誠忽有所感一日祥雲滿庭光燭殿壇旌幢鶴蓋浮空而下見一天官羽衣寳冠昇殿而坐謂妙想曰吾乃徃昔有虞氏之君舜帝也勞猒萬國養道此山每欲誘教後人使之知道世無可教授者夫道在於内不在於外道在爾身不在他人玄經所謂修之於身其德乃眞近者地司所奏汝守道不邪遵禀玄戒若無所證乃道之棄人也又玄經云常善救物故無棄物而道之布惠周遍則物物皆欲成之人人皆欲度之但世人福果卑微道炁膚淺不能精專勤學道業未就而巳中怠是人自棄道非道棄人蓋上聖髙眞愍歷劫不常代運流轉隂陽倚伏生死推遷俄爾之間至陽九百六之㑹孜孜下教以救於人尤切於世人之求道也然世人求道也若存若亡繫念存心萬中無一天眞愍俗常在人間隱影化形隨方開悟子欲長生三一當明子能守一一亦守子矣能變爲精精變爲嬰兒嬰兒上爲眞人眞人然後爲亦子此是眞人一也又曰僞道養形眞道養神神眞道通能亡能存神能飛形亦能移山形受灰土其何識焉身目聲色爲子留愆鼻口所喜香味是𡨚身爲惱本痛痒寒温意爲形累愁毒憂煩弗疾去之則志氣自耗夀命不延臣等欽惟上聖哀救世人廣示訓章開度羣品當遵品戒竭心修習負荷至恩不勝慚激一心發念五體傾依稽首慈尊敬禮眞聖志心朝禮虚無自然元始天尊志心朝禮玉宸道君靈寳天尊志心朝禮太上老君道德天尊志心朝禮法主玄天仁威上帝志心朝禮聖父明眞大帝志心朝禮聖母瓊眞上仙志心朝禮聖師豐乾大帝志心朝禮西國紫玄元君志心朝禮金闕化身天尊志心朝禮玄元顯應天尊志心朝禮太清靈變天尊志心朝禮日光開瑞天尊志心朝禮武曲應化天尊志心朝禮虚星應化天尊志心朝禮危星應化天尊志心朝禮天一應化天尊志心朝禮太一應化天尊志心朝禮辰星應化天尊臣等志心皈身皈神皈命玄天應靈顯化諸尊臣等恭承經寳太上垂訓曰齋戒者道之根本法之津梁子欲學道清齋奉戒念念正眞邪妄自泯一切衆生捨清淨域躭嗜葷羶而以觸法譬如餓鬼㗖食死屍火燒飢腸飢腸無飽又如蠅蟲爭奪臭腐妄爲羶香而以觸法三宫溷濁六腑不淨尸魄欣昌樂於死地子當割嗜欲根入眞淨境無作諸苦無造諸惡無生諸見無犯諸邪子觀戒文如世法律欲有所犯愳金木刑子於戒文精意奉持凛然在前如對所畏秉心正嚴滅一切想諦聽不二可㑹正眞是吾弟子也謹按修眞第六品戒云不得飲酒過差食諸猒物以今弟子某等切慮縱心侈欲玩意貪觀量吸鯨吞日夕第從於酩酊味躭鴆毒歳時惟喜於腥羶假名乎仙境之瓊漿求異乎貴家之玉食忘形嗜好適興肥甘百醉千塲裸袒轉成於放曠五辛六猒㗖嘗務在於飽充穢氣爍人沈酗亂性舉動第多於狂惑語言罔顧於淫邪矧當齋禴之辰偏起殱殘之念但資口腹不謹身軀遍街握腕以潜行穢室躡蹤而競徃所爲不擇其處非良踐履旣虧設施徒謬上來徃業見在世中立身譾薄舉事卑汙死墮地獄長劫受苦苦盡復生遂入惡道報盡復還生於茲世以前業故尚有餘殃受報未己今則聞經所說大可驚惶仰對聖前恭投懴悔一心致䖍皈依信禮志心朝禮靈元虚湛天尊志心朝禮靈始象仙天尊志心朝禮靈常淡寂天尊志心朝禮靈逹無爲天尊志心朝禮靈爲悟本天尊志心朝禮靈能合漢天尊志心朝禮靈通無極天尊志心朝禮靈一通神天尊志心朝禮靈欲觀妙天尊志心朝禮靈藏萬化天尊志心朝禮靈當利用天尊志心朝禮靈炁致柔天尊志心朝禮靈昶微明天尊志心朝禮靈顔瑞妙天尊志心朝禮靈光及物天尊志心朝禮靈音演妙天尊志心朝禮靈文溥暢天尊志心朝禮靈書紀教天尊志心朝禮靈風傳瑞天尊志心朝禮靈運隂陽天尊志心朝禮靈彰造化天尊志心朝禮靈周十地天尊志心朝禮靈超萬慮天尊志心朝禮靈光法性天尊志心朝禮靈化無私天尊志心朝禮靈轉無涯天尊志心朝禮靈用不窮天尊志心朝禮靈慶有性天尊志心朝禮靈智不殆天尊志心朝禮靈根持重天尊志心朝禮靈無妄作天尊志心朝禮靈無彼竟天尊志心朝禮靈除我智天尊志心朝禮靈機逐變天尊志心朝禮靈根復命天尊志心朝禮靈洞大無天尊志心朝禮靈泉大有天尊志心朝禮靈有大惠天尊天尊上聖禮念旣周再竭一心遥瞻神府皈命紫皇天一眞慶宫元和遷校府北極佑聖院諸眞仙衆今日道場大衆䖍叩教主北極鎭天佑聖助順眞武靈應福徳眞君玉虚師相玄天上帝伏願甲騎前驅丁神後從茂揚休祉俯洽黎民今爲弟子某懴除上來所犯六品戒云飲酒過差食諸猒物之罪先世今生遺殃徃劫上延祖考下逮宗親沉酣不巳而溺志踈强遊宴無度而裸身廢禮喜烹異味不知猒觸之愆故殺含靈專事膾炙之美誇恃酒聖宰戮物牲䙝慢高眞難逃重譴罪將條列惡巳貫盈撓亂靈司紏録不已今憑懴悔顒望宣恩勑下九府業道治罪宜官主録曹僚靈司掾吏執法大神廣行慈潣並賜赦原求懴弟子某同法衆等遵奉玄科入道登眞戒常行清淨匆矜汙俗澄神淨慮約巳存神飲無過多食無猒穢守皆醉獨醒之悔微以借紅楯養生送死之䂓資之斑白即斯發露徑此懴陳伏願澤沛乾坤恩垂雨露原宥顛狂之譴鑒觀改悔之私惠及草萊咸享安康之樂光浮蓬蓽永消暗昧之虞常奉至眞永依玄教以斯利益遍悉粧嚴國治民安莫匪平寧而置器官清道泰曽何凌犯以爭衡一切有情俱登道岸北極眞武普慈度世法懴卷之六
