front:
  text: 北極眞武普慈度世法懴卷之七八同卷則十三
  hash: sha256:3582432bc1bc6494acc8533fe12a82348296af6a41556a81a79c28e49069b959
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0212_SJB_007-180369b, image: sjb/18/180369b.png}
body:
  text: 歩虚爾時妙行眞人告諸仙曰昔太上顯號靜老天尊行教五方開度人天乃先天地以資萬𩔖上處玉京爲神王之宗下在紫微爲飛仙之祖千變萬化有德不德隨機應物厥跡無常授軒轅於崆峒教帝嚳於牧德大禹承長生之訣尹喜受道德之㫖丹書紫字昇玄飛歩之經玉石金光妙有洞靈之說如此之文不可勝紀自上古歷劫至黄帝帝嚳夏禹並遇神人咸受道籙年代旣久經史無聞造及姬周東辭函谷西入罽賔見恍愡之容演希夷之訓是以善利西方化流中國且夫人之生也天傅之以神地傅之以精中和傅之以炁人能保精愛神護炁内則致身長生外則致國太平故爲人臣者當上忠其君欲其長生爲人子者當念父母懼其將老爲人弟子者當念師恩蓋受身於父毋成道德於眞師得水土之養於君尊當念君父師之將老無以復之或行學修善更師賢明求竒才異術而資益之此乃太古上皇嘗令修善之人言行精實心自克責洗心易行感動上玄受天地恩不忘報謝精專弗怠得致神仙臣等幻化生身叨承蓋載君親寵渥父毋劬勞得佩訓章敢忘所自式憑香火用報洪恩秉躬致䖍一心發念稽首皈依正眞三寳志心朝禮虚無自然元始天尊志心朝禮玉宸道君靈寳天尊志心朝禮太上老君道德天尊志心朝禮玉虚師相玄天上帝志心朝禮聖父明眞大帝志心朝禮聖母瓊眞上仙志心朝禮聖師豐乾大帝志心朝禮西國紫玄元君志心朝禮金闕化身天尊志心朝禮玄元顯應天尊志心朝禮太清靈變天尊志心朝禮髙上玉眞天尊志心朝禮日光開瑞天尊志心朝禮武曲應化天尊志心朝禮虚星應化天尊志心朝禮危星應化天尊志心朝禮天一應化天尊志心朝禮太一應化天尊志心朝禮辰星應化天尊臣等志心皈身皈神皈命三寳至尊玄天上帝顯靈應化諸大天尊臣恭聞太上垂訓曰一切衆生處在浮世百年幾日如時餉間石火電光何能得久如蛾撲燈自取殞滅不能明了誤此縈纏惟懷恡惜常負貪求聚積山髙心猶不足一日之活作千年計生既不將一錢來死亦不將一錢去一朝身殁萬事皆空無量慳貪盡成虚幻在世積財不散寧免水火盗賊之菑用計謀人豈免乏絶子孫之報當此之時英䧺豪貴頓爾俱消髙車大馬何關人事華堂峻宇盡屬他人姻眷吁嗟有何所益謹按修眞第七品戒云不得貪求無猒積財不散重念臣等私憂過計遐想貪圖積貯務多貪饕何巳兼并貨賄欲此富而彼貧攘取田廬視我强而他弱登龍斷而罔利競蝸角以求贏朝謀夕慮而惟恐其無左經右營而不滿所欲稻𥹭腐廪肯分顆粒以賑飢錢楮充梁豈散一毫而濟乏奉養且聞於薄鄙困窮奚暇於憫憐席卷猶求囊慳愈澁上來徃業見在世中慮勤憔悴禍遇㓂攘死墮地獄長劫受苦苦盡復生遂入惡道報盡復還生於茲世以前業故尚有餘殃受報未巳今則聞經所說大可驚惶仰對聖前恭投懴悔一心致䖍皈命敬禮志心朝禮空蕆大象天尊志心朝禮空量太華天尊志心朝禮空包妙寂天尊志心朝禮空澄太定天尊志心朝禮空清太漢天尊志心朝禮空惟無作天尊志心朝禮空處無爲天尊志心朝禮空符至一天尊志心朝禮空理無碍天尊志心朝禮空藏常用天尊志心朝禮空含法界天尊志心朝禮空相不拘天尊志心朝禮空谷妙利天尊志心朝禮空顯淨明天尊志心朝禮空傳大梵天尊志心朝禮空虚示法天尊志心朝禮空談妙理天尊志心朝禮空文持妙天尊志心朝禮空洞飛章天尊志心朝禮空歌振響天尊志心朝禮空韻流鈴天尊志心朝禮空谷應聲天尊志心朝禮空照靈境天尊志心朝禮空成萬化天尊志心朝禮空明太白天尊志心朝禮空談清音天尊志心朝禮空行清髙天尊志心朝禮空相無妄天尊志心朝禮空智無境天尊志心朝禮空妙非常天尊志心朝禮空才廣德天尊志心朝禮空靜無歸天尊志心朝禮空不定應天尊志心朝禮空歸無滯天尊志心朝禮空來滅念天尊志心朝禮空無不成天尊志心朝禮空不碍色天尊志心朝禮空體至無天尊志心朝禮空法澄虚天尊天尊上聖禮念旣周再竭一心遥瞻神府皈命紫皇天一眞慶宫元和遷校府北極佑聖院一切仙衆今日道場大衆䖍叩教主北極鎭天佑聖助順眞武靈應福德眞君玉虚師相玄天上帝伏願履龜按虵駕鸞馭鳯大開慈潣廣濟凡庸今爲弟子某求懴上來所犯第七品戒貪求無猒積財不散之罪先世今生遺殃徃劫上延祖考下逮宗親探取人財以爲已財䂓圖人物以爲己物沉機不露狡計妄施或貿遷在市而視有若無或收藏潤屋而用虚易實數盈億兆用悋纎毫惟貪富積以快心不顧財多能害已罪將條列惡巳貫盈撓亂靈司紏録不巳今憑懴力顒望宣恩勑下司功紏非陽官隂吏執籙把籍掌憲天神善惡明靈校量宰佐廣行慈憫並賜赦原求懴弟子某同法衆等遵奉玄科入道登眞戒當行知足常守節操誓從今去善因早植微利勿貪囊箱隨分以貯儲倉廪何憂於匱乏知止知足經營肯事於過求可速可行周急不爲之繼富即斯發露徑此懴陳伏願生成廣佑於範圍臨照不殊於覆蓋門户享興隆之福尊卑承靖謐之庥天相匪虚俯仰各安於飽煖日生不竭散布庶盡於周流常奉正眞永依玄教以斯利益遍悉莊嚴隱顯交通存亡超度九幽開泰八難消屯出黑道登朱宫即膺㧞擢拜洪恩承惠澤咸使沾濡一切有情俱登道岸北極眞武普慈度世法懴卷之七
