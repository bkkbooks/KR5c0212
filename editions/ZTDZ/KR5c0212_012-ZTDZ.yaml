body:
  text: 胎息眞仙章第十一胎息眞仙食炁得却閉眞炁成胎息服炁經云一百日五臟靈踈方可入胎息准九天神經云先須密室無風厚軟氈席枕高四指方與身平用一志人同心道侣捐捨凡心握固仰卧情無所得物無所牽靈炁漸閉心識怡然初閉經十息至十五息二十息百息只覺身從一處如在房中只要心不動移凡一日一夜十二時都共一萬三千五百息故太微昇玄經云炁絶曰死炁閉曰仙魄留守身魂遊天上若閉炁至百息魂神當見其魄者縁是陰神魂者陽神且陰神常欲人死不欲人生其神七人衣黑衣戴黑冠秉黑璽洞神經云爲之玄母此神是陰尸之主若見此神子當謹心存念咒曰玄母玄母吾尸之主長骨養筋莫離屍去吾與魂父同遊天去次當見魂父有三人各長一尺五寸衣朱衣戴朱冠持朱璽當引上元宫見諸腦神百餘人出子身當見三丹田中元炁如白雲光照洞達子當謹呼三魂名一曰爽靈二曰胎光三曰幽精得此三魂陽神領腦宫諸神萬萬千千引子元神遊於上天當出之時但覺身從炁房中出當見種種鬼神形容之狀或偉大者數丈或微小者如燕雀或披髮若亂蓬或開眼如張電縁爲上界之道皆是鬼神之過路子但當安心定志勿生怪畏自達安境如一切無所見者最爲上也但黑白分明是善相也所以須要得良友相伴相助縁元炁上與魂神相應切慮定息之時别有所見心則不安元炁當自口鼻中出則故子身不得去也但一夕之中令傍人或自記喘息數至千息子當與三元神同遊上界也其道當成其道既成之後不得微有泄漏神理最爲上妙大忌大忌大愼之大愼之不可有漏泄於人也但不顧於物不生異心鬼神及魔自伏其德羽服彩霞何所得皆從五藏生雲翼煉形上昇自化成五色羽衣中天羽經云輕輕狀蟬翼璨璨光何極蟬爲飲露食炁而故生羽翼人服元炁而天衣下凝於體則可知也五藏眞炁章第十二五藏眞炁芝苗英太華受識經云元炁舍化布成六根吉凶受用應行相從内炁爲識胎炁爲神子能胎息還嬰返魂也五藏之始先布於水内有六府外應六根肝主東方其色青太明五緯經云肝主於木生於水尅之於土來自東方其色青蒼受之於陽潜伏此炁千息生光但常用炁未至胎息當存想青炁出之於左脅但六時思之不輟自子時常隔一時思之至五十日當見此炁如青雲用此炁可理一切之人熱疾時行癰腫疥癬及瘦但觀前人疾狀量其淺深想此炁攻之無不愈瘥如觀前人患肝經之病面色枯悴則稍難理之不可治也子但閉固經千息青色周流色自然胎息經云千息色青内自凝結者也心主南方其色赤服之千息赤色出太明五緯經云心主於火生之於木尅之於金來自南方其色赤受之於朱陽爲夏天也潜伏千息當出心堂常服炁未至胎息者常以每至午時想赤炁自心存如鷄子許漸漸運赤炁從頂而出出者自散存之咒曰南方丙丁赤龍居停陰神避位陽官下迎思之即至用之即靈自此三咒之常行此炁勤誠存想五十日不關當有赤炁如火光自見用此炁可理諸人一切冷病使炁攻之即瘥愈而矣如患人面色帶青者乃陰炁不可治也凡存咒想神炁法者並忌他人知之肺主西方其色白服之千息其色極太明五緯經云肺主於金生之於土尅之於木來自西方其色白澄淨微芒潜伏千息光明洋洋常服每至丑時存想肺間有炁狀如白珠其光漸大上注於眉間存之咒曰西方庚辛太微玄眞内應六府化爲肺神遊於丹田固護我命用之神仙急急如律令存念一遍如此四十九日肺中有炁如白雲自出此炁可照地下一切寳物及察人之善惡示表如裏如不存想此法服炁三年方見五藏内事此縁不具眞行使用不辯相尅相生如寒用心氣縁是火炁如熱用腎炁縁是水炁不達此用炁則亦無效也九炁經中亦不言炁法寥廓尚秘况是人間者也脾主中央其色黄服之知千息其色昌太明五緯經云脾主於土生之於火尅之於水來自中方其色黄閉服千息但當一日一想不限時節亦無咒法其脾藏存之四十九日自見此炁脾中而出已後可將身隱入墻壁無所礙也腎主北方其色黑服之千息其色得太明五緯經云腎主於水生之於金尅之於火來自北方其色黑伏之下元主持命房内有眞白守之不忘此五藏神炁但至五更初各存想炁色都於頂上不必一一别存想兼不用咒法亦得只是校遲百日後其色已成立可用驗也驅役萬靈自有則服炁心志兼持内行内外相扶元炁充滿五藏及丹田之中至周年之後應是世間鬼怪精魅及土地神祇並不敢藏形所在之處地界神祇自來拜迎常隨衛道者陰司六籍善惡之事俱得知委然亦不可便將驅使縁未具三天眞籙慮有損折若入胎息得昇身訣者但要游人間當依此經尸解法自然遊世即無遮碍而已不爾未可忘道也若不務此術者但務化人而已自他俱利者也乘服彩霞歸太極胎息伏陰經云内息無名内行相成若不持戒行未入胎息豈得合神若人未入胎息如要游人間者可行尸解之衍太微靈隱書曰凡人未入胎息及已入胎息者要游人間俱可行尸解之術隨物所化故有託衣衾所化者常以庚辛日取庚時於淨室中所卧牀頭須設機案焚名香一爐下著柱者龍杖及履鞋等物盡安置於頭邊身不解衣衾及以衾蓋之首西而卧自念身作死人當暗念此咒七遍咒曰太一玄冥受生自靈七思七召三魂隨迎代佘之身掩佘之形形隨物化應化而成急急如律令咒畢此法存念一食之間但當依尋常睡卧如修之日存念之起輒不得與外人語言忌之若與人言者其法不成如此常行四十九日漸漸法成既成之後或要作則不問行住坐卧暗念此咒七遍隨手捉物自身便去衆人只見所執者之物化爲己身身將已死矣後却見物還歸本形此法即可以下界避難助身不可爲非道之事大須愼護其法大須隱默若卧在牀上但以被覆其身隱化者暗念咒一遍便却去他人只見所卧衾被是彼形死屍却不見衣衾法成大忌財色留心神明誅折也太極眞宫章第十三太極眞宫住碧空絳闕崇臺萬萬重玉樓相倚列危峯上界宫館生於窈冥皆五色之炁而結成下界土地皆是水炁横凝而扶住故不得自在不得堅長不得平正上界以八珍爲土地七寳爲用器至於宫殿七珍合成有自然不運之力無人興動用之功上界以七珍精炁爲日月下界以陰陽純炁爲日月下界言一年三百六十日是上界一日十二時也太微玄經云不食土地精生居太一城此爲形神俱得去也瑶殿瓊光彩翠濃紅雲紫炁常雍容玉壁全楹内玲瓏玄宫玉堂經云白玉爲壁黄金爲柱青珊爲樑紅玉爲牀爲七珍翠彩焕爛光徹内外無礙千閣萬樓互相影對大仙眞人猶居此之外者也鳳舞鸞歌遊詠中上界有天鳳之舞鸞霄之歌皆是曲名者也玉饌金漿任意從九宴玄厨經云一日十進九霄之膳七獻八瓊之漿一日十進七獻酒也九炁眞仙位列崇服胎息成者得列九眞上仙矣九炁眞仙章第十四九炁眞仙衣錦衣綃穀雲裳蟬帶垂眞君衣瓊文錦蟬翼之衣者也天冠揺響韻參差冠摇衆珮響亮五音之韵爲自然也九文花履錦星奇九文錦爲履其花零亂如衆星攢璧者也却佩霓裳朝太儀霓裳仙官朝服也初得仙皆朝太儀眞君九天之主也十方彩女執旌麾百靈引駕玉童隨前有龍幡後虎旗前朱雀後玄武左青龍右白虎皆是百靈之數也羽服飄颻八炁吹八炁乃八方之正炁也先治道路而矣更上寥天入太微太微九天都在第五天金星輪朱華宫轄日月五星神宿行運之時亦管下界生死之籍奏聞太微凡此官吏曹署約四十萬局衆大數也太微玄宫章第十五太微直上寥天界動靜風調鳴竽籟太微上界所有風摇皆如笙簧之韻極樂之所自然如此殿閣穹崇何杳隗杳隗謂虚峻極也殿閣重數甚多横壯尤麗而矣壽永衣輕人體大九天各各皆相倍九天羽服儀仗各相次加倍羽衣轉輕人體轉大彩翠鮮華日月轉邁長遠也是謂因心得自在因心運身得出三界也靜理修眞爲聖人九行空門列眞載夫九行者道人之窟宅也動息住持不離其内一者爲以慈慜爲衣二者以止捨爲食三者以正心爲乘四者以專志爲財五者以謙下爲牀六者以順義爲器七者以懃慧爲窟八者以修空爲宅九者以陰施爲業修道之子不持此九行去道至踈遠矣九行空門章第十六九行空門至眞路大道不與人爭怒動息能持勿暫停陰神返照神常助持心不息其道易成諸行無心是實心因心運得歸天去無心之心因心運心道雖無心還因心有除垢無心是謂眞衆事曰垢無事曰除除心止念萬行歸余也自隨胎息入天門胎息以善行爲要機以無念爲至路者也玄元正理内藏身無曲潜形體合眞洞玄經云心無曲萬神足三部清虛元炁固六腑翻成百萬神三元靜則六腑調眞炁歸則萬神應二理相合五藏六府諸神共有百萬之餘自然顯現相和應也六腑萬神章第十七六腑萬神恒有常五藏六腑百關九節有神百萬若日常清淨修之即當自見矣大腸之中主肺堂腑爲首三焦之主也元和淨理穀實盡但以元炁攻運何慮穀炁之不去中有靈神自隱藏藏府既淨萬神自藏故太明經云大腸主肺也鼻柱中央爲腸重一十二兩長一丈二尺廣八寸在臍左邊曲疊積一十二盤貯水穀一斗二升主一十二時内有神各具本色衣冠一十二人若除水穀炁盡元炁自足其神當見各於本時遞相護衛修道之子者也腎腑當明内宫女外應耳宅爲門户内神經云精主腎腎爲後宫内宫列女主腎耳之宫承炁於耳也左腎爲壬右腎爲癸循環兩耳門中有神五百人内有元神守之都管兼主志智凡人好嗔怒則傷腎腎傷則失志失志則喪道之本也元神亦散修行之人大忌嗔怒道成則内神常見於人衛道者也膀胱兩腑合津門氣海循環爲要路膀胱是兩腑爲津門腎合於膀胱乃受津之府上應於舌根也津液往來常潤澤肌體舌岸以應兩膀胱炁少則不潤服炁之人常欲少語以養津液故語多則口乾口乾則難用炁也中有神三百六十人以應一年之數炁成當見其神常抱無貪之行故道者不貪志合神理大洞昇玄經云行合神見道成歸天此神人行胎息即自出常以護衛人近道也子當得見内神彰終身不泄神常助終始不泄天神助子勿泄天機章第十八勿泄天機子存志凡是天章無輕示凡遇天經子莫輕泄當志愼之三十三篇世絶知况復中黄秘中秘道有胎光經三十三篇禁絶不許妄傳况兹中黄靈句秘之特重愼之愼之者矣先禮三眞玉仙使然後精心睹文字教令科云欲開示三眞等經先須擇甲子日淨室焚香心存南華眞人念九天眞聖三天眞君同開作證首東作禮四拜方許開示然後云某爲求道輒開九天大聖眞文傳示一遍故得百靈同助身歸太无名入天户不得示於三人切忌容易泄漏若不依經教妄開示者及如睹常文必有殃責非淺獲過不輕矣違教身罹非橫殃子孫受禍當須忌餘殃明罰世世子孫受禍大忌大忌太清中黄眞經卷下
